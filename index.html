<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In</title>

  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; font-family: Inter, system-ui; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #4f46e5;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }

    .card {
      width: 420px;
      background: white;
      border-radius: 24px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.2);
      text-align: center;
      overflow: hidden;
      position: relative;
      z-index: 1;
    }

    .slideshow {
      position: relative;
      width: 100%;
      height: 200px;
      overflow: hidden;
    }

    .slideshow img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity 0.8s ease;
    }

    .slideshow img.active { opacity: 1; }

    .dots {
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 6px;
    }

    .dot {
      width: 6px; height: 6px;
      border-radius: 999px;
      background: rgba(255,255,255,0.5);
    }
    .dot.active { background: white; }

    .cardBody { padding: 32px 40px 40px; }

    h1 { font-size: 26px; font-weight: 700; color: #0f172a; margin-bottom: 6px; }
    .sub { font-size: 14px; color: #94a3b8; margin-bottom: 28px; }

    #status { margin-top: 16px; font-size: 13px; color: #475569; min-height: 20px; }

    /* Location setup form — hidden by default, shown when needed */
    #locationSetup {
      display: none;
      margin-top: 20px;
      text-align: left;
    }
    #locationSetup.open { display: block; }

    #locationSetup label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #475569;
      margin-bottom: 8px;
    }

    #locationSetup input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      font-size: 14px;
      color: #0f172a;
      background: #f8fafc;
      outline: none;
      margin-bottom: 12px;
    }

    #locationSetup input:focus { border-color: #a5b4fc; }

    #locationSetup button {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: none;
      background: #4f46e5;
      color: white;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    #locationSetup button:hover { background: #4338ca; }

    /* Nav buttons */
    .nav {
      display: none;
      gap: 10px;
      justify-content: center;
      margin-top: 20px;
    }

    .btn {
      border: none;
      border-radius: 12px;
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    .btn.secondary {
      background: #f1f5f9;
      color: #0f172a;
      border: 1px solid #e2e8f0;
    }

    .btn.admin { background: #fef3c7; color: #92400e; }

    .footer {
      margin-top: 20px;
      font-size: 12px;
      color: rgba(255,255,255,0.4);
      text-align: center;
    }
  </style>
</head>

<body>
  <div>
    <div class="card">

      <!-- Slideshow -->
      <div class="slideshow" id="slideshow">
        <img src="./assets/cars/porsche/911/1.jpeg" class="active">
        <img src="./assets/cars/dodge/challenger/1.png">
        <img src="./assets/cars/honda/civic/1.jpeg">
        <img src="./assets/cars/kia/k4/1.jpeg">
        <img src="./assets/cars/toyota/highlander/1.png">
        <img src="./assets/cars/toyota/corolla/1.png">
        <div class="dots" id="dots"></div>
      </div>

      <div class="cardBody">
        <h1>Welcome</h1>
        <p class="sub">Car rentals, made simple.</p>

        <!-- Google Sign In -->
        <div id="g_id_onload"
          data-client_id="338952355189-kifevvua8bpk9bn6sp8dqbrthb79h8f5.apps.googleusercontent.com"
          data-callback="handleCredentialResponse">
        </div>
        <div class="g_id_signin" data-type="standard"></div>

        <div id="status"></div>

        <!-- Location setup — shown after first login if no location saved -->
        <div id="locationSetup">
          <form id="locationForm">
            <label for="locationInput">Your city (e.g. Toronto, Kitchener)</label>
            <input
              id="locationInput"
              type="text"
              placeholder="Enter your city"
              autocomplete="off"
            >
            <button id="saveLocationBtn" type="submit">Save & Continue →</button>
          </form>
        </div>

        <!-- Nav shown after full login -->
        <div class="nav" id="navArea">
          <button class="btn secondary" onclick="window.location.href='home.html'">Home</button>
          <button class="btn secondary" onclick="window.location.href='cars.html'">Cars</button>
          <button class="btn admin" id="adminBtn" style="display:none;" onclick="window.location.href='admin.html'">Admin</button>
        </div>

      </div>
    </div>

    <div class="footer">© 2025 CP317 Group 8</div>
  </div>

  <script src="app.js"></script>

  <!-- Slideshow -->
  <script>
    const slides = document.querySelectorAll("#slideshow img");
    const dotsEl = document.getElementById("dots");
    let current = 0;

    slides.forEach((_, i) => {
      const d = document.createElement("div");
      d.className = "dot" + (i === 0 ? " active" : "");
      dotsEl.appendChild(d);
    });

    const dots = document.querySelectorAll(".dot");

    function goTo(n) {
      slides[current].classList.remove("active");
      dots[current].classList.remove("active");
      current = (n + slides.length) % slides.length;
      slides[current].classList.add("active");
      dots[current].classList.add("active");
    }

    setInterval(() => goTo(current + 1), 3000);
  </script>
</body>
</html>
