<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In</title>

  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; font-family: Inter, system-ui; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #4f46e5;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }

    /* background circles for some depth */
    body::before {
      content: '';
      position: absolute;
      width: 600px;
      height: 600px;
      border-radius: 999px;
      background: rgba(255,255,255,0.05);
      top: -200px;
      right: -150px;
    }
    body::after {
      content: '';
      position: absolute;
      width: 400px;
      height: 400px;
      border-radius: 999px;
      background: rgba(255,255,255,0.05);
      bottom: -150px;
      left: -100px;
    }

    .card {
      width: 420px;
      background: white;
      padding: 48px 40px;
      border-radius: 24px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.2);
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .icon {
      width: 56px;
      height: 56px;
      background: #eef2ff;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 26px;
    }

    h1 {
      font-size: 26px;
      font-weight: 700;
      color: #0f172a;
      margin-bottom: 6px;
    }

    .sub {
      font-size: 14px;
      color: #94a3b8;
      margin-bottom: 32px;
    }

    #status {
      margin-top: 16px;
      font-size: 13px;
      color: #475569;
      word-break: break-word;
    }

    .nav {
      display: none;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 20px;
    }

    .btn {
      border: none;
      border-radius: 12px;
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn.secondary { background: #f1f5f9; color: #0f172a; border: 1px solid #e2e8f0; }
    .btn.admin     { background: #fef3c7; color: #92400e; }
    .btn:hover     { filter: brightness(0.95); }

    .footer {
      margin-top: 24px;
      font-size: 12px;
      color: rgba(255,255,255,0.45);
      position: relative;
      z-index: 1;
      text-align: center;
    }
  </style>
</head>

<body>

  <div>
    <div class="card">
      <div class="icon">🚗</div>
      <h1>Welcome</h1>
      <p class="sub">Car rentals, made simple.</p>

      <div id="g_id_onload"
           data-client_id="338952355189-kifevvua8bpk9bn6sp8dqbrthb79h8f5.apps.googleusercontent.com"
           data-callback="handleCredentialResponse"
           data-auto_prompt="false">
      </div>

      <div class="g_id_signin"
           data-type="standard"
           data-size="large"
           data-theme="outline"
           data-text="signin_with"
           data-shape="rectangular">
      </div>

      <div id="status"></div>

      <div class="nav" id="navArea">
        <button class="btn secondary" onclick="window.location.href='home.html'">Home</button>
        <button class="btn secondary" onclick="window.location.href='cars.html'">Cars</button>
        <button class="btn admin" id="adminBtn" style="display:none;" onclick="window.location.href='admin.html'">Admin</button>
      </div>
    </div>

    <div class="footer">© 2025 CP317 Group 8</div>
  </div>

  <script src="app.js"></script>
</body>
</html>
