
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cars</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{ box-sizing:border-box; font-family:Inter,system-ui; }

body{
  margin:0;
  background:linear-gradient(180deg,#eef2ff,#f8fafc);
}

.container{
  max-width:1400px;
  margin:auto;
  padding:40px;
}

header{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

h1{ font-size:44px; margin:0; }

.sub{ color:#555; }

.topRow{
  display:flex;
  justify-content:space-between;
  margin:30px 0 12px; 
  gap:16px;
}

button{
  padding:12px 18px;
  border-radius:14px;
  border:none;
  cursor:pointer;
}

.primary{ background:#4f46e5;color:white; }
.secondary{ background:white;border:1px solid #ccc; }

.searchBox{
  height:46px;
  border-radius:14px;
  border:1px solid #ddd;
  padding:0 14px;
  width:300px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:24px;
}

.card{
  background:white;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 12px 30px rgba(0,0,0,.06);
}

.card img{
  width:100%;
  height:220px;
  object-fit:cover;
  background:#ddd;
}

.cardBody{ padding:18px; }

.headerRow {
  display: flex;
  justify-content: space-between;
  align-items: flex-start; 
  gap: 16px;
}

.headerLeft h3{ margin:0; line-height:1.2; }
.headerLeft .meta{ margin-top:4px; }

.heartBtn {
  background: transparent;
  border: none;
  padding: 0; 
  cursor: pointer;
  margin-top: 4px; 
}

.heartBtn svg {
  width: 24px; 
  height: 24px; 
  transition: transform 0.15s ease;
}
.heartBtn:hover svg {
  transform: scale(1.15);
}

.titleRow{ display:flex; justify-content:space-between; }
.price{ font-weight:600; }

.tag{
  display:inline-block;
  padding:6px 12px;
  border-radius:999px;
  font-size:12px;
  margin:8px 0;
}

.available{ background:#dcfce7;color:#166534; }
.unavailable{ background:#fee2e2;color:#991b1b; }
.meta{ color:#555;font-size:14px; }

.cardActions{ display:flex; gap:12px; margin-top:14px; }

.linkBtn{
  flex:1; text-align:center; padding:10px;
  border-radius:12px; text-decoration:none; font-weight:600;
}

.viewBtn{ background:#4f46e5;color:white; }
.bookBtn{ border:1px solid #ccc;color:black; }

@media(max-width:900px){
  .grid{grid-template-columns:1fr;}
  .topRow{ flex-direction:column; align-items:stretch; }
  .searchBox{ width:100%; }
}

#filterPanel{
  display:none;
  margin:10px 0 22px;
  padding:18px;
  border-radius:18px;
  background:rgba(255,255,255,0.7);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  border:1px solid rgba(148,163,184,0.35);
  box-shadow:0 16px 45px rgba(15,23,42,0.10);
}

#filterPanel .sub{ color:#475569; font-size:13px; }
#filterPanel select, #filterPanel input[type="range"]{ outline:none; }

#filterPanel select{
  height:44px; border-radius:14px;
  border:1px solid rgba(148,163,184,0.45);
  background:rgba(255,255,255,0.95);
  padding:0 12px; min-width:190px;
  transition:box-shadow .15s ease, border-color .15s ease;
}
#filterPanel select:focus{
  border-color:rgba(79,70,229,0.55);
  box-shadow:0 0 0 4px rgba(79,70,229,0.15);
}
#filterPanel input[type="range"]{
  width:260px; height:6px; border-radius:999px;
  background:rgba(148,163,184,0.35);
}
#filterPanel input[type="range"]::-webkit-slider-thumb{
  -webkit-appearance:none; appearance:none;
  width:18px; height:18px; border-radius:999px;
  background:#4f46e5; border:2px solid white;
  box-shadow:0 10px 18px rgba(79,70,229,0.25); cursor:pointer;
}
#filterPanel input[type="range"]::-moz-range-thumb{
  width:18px; height:18px; border-radius:999px;
  background:#4f46e5; border:2px solid white;
  box-shadow:0 10px 18px rgba(79,70,229,0.25); cursor:pointer;
}
#clearFilters{ border:1px solid rgba(148,163,184,0.55); background:rgba(255,255,255,0.85); }
#clearFilters:hover{ background:white; }
#filterBtn:hover{ border-color:rgba(79,70,229,0.35); box-shadow:0 10px 22px rgba(15,23,42,0.06); }

.card.clickable:hover {
  transform:translateY(-4px);
  box-shadow:0 20px 40px rgba(79,70,229,0.15);
  transition:all 0.2s ease;
}
</style>
</head>

<body>
<div class="container">

  <header>
    <div>
      <h1>Cars</h1>
      <div class="sub" id="carsSubtitle">Live from SQL database</div>
    </div>
    <div>
      <button class="secondary" onclick="location.href='home.html'">← Home</button>
    </div>
  </header>

  <div class="topRow">
    <input id="searchInput" class="searchBox" placeholder="Search by make/model">
    <button id="filterBtn" class="secondary" type="button">Filter</button>
  </div>

  <div id="filterPanel" style="display:none; margin-bottom:20px; background:white; border:1px solid #e5e7eb; border-radius:16px; padding:16px; box-shadow:0 10px 25px rgba(0,0,0,.06);">
    <div style="display:flex; gap:16px; flex-wrap:wrap; align-items:end;">
      <div>
        <div class="sub" style="margin-bottom:6px;">Vehicle Type</div>
        <select id="filterType" style="height:42px; border-radius:12px; border:1px solid #ddd; padding:0 12px; min-width:180px;">
          <option value="">Any</option>
          <option value="Sedan">Sedan</option>
          <option value="SUV">SUV</option>
          <option value="Sport">Sport</option>
        </select>
      </div>
      <div>
        <div class="sub" style="margin-bottom:6px;">Drivetrain</div>
        <select id="filterDrive" style="height:42px; border-radius:12px; border:1px solid #ddd; padding:0 12px; min-width:180px;">
          <option value="">Any</option>
          <option value="AWD">AWD</option>
          <option value="FWD">FWD</option>
          <option value="RWD">RWD</option>
        </select>
      </div>
      <div style="min-width:260px;">
        <div class="sub" style="margin-bottom:6px;">Max price : <span id="priceLabel">Any</span></div>
        <input id="filterPrice" type="range" min="0" max="2000" step="50" value="2000" style="width:260px;">
      </div>
      <div style="display:flex; gap:10px;">
        <button id="clearFilters" class="secondary" type="button">Clear</button>
      </div>
    </div>
  </div>

  <div class="grid" id="carsGrid"></div>

</div>

<div id="vehicleModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:1000; align-items:center; justify-content:center;">
  <div style="background:white; border-radius:20px; padding:32px; max-width:560px; width:90%; max-height:85vh; overflow-y:auto; box-shadow:0 20px 60px rgba(0,0,0,0.25); position:relative;">
    <button onclick="closeModal()" style="position:absolute; top:16px; right:16px; background:none; border:none; font-size:22px; cursor:pointer; color:#64748b;">✕</button>
    <img id="modalImg" src="" alt="" style="width:100%; height:200px; object-fit:cover; border-radius:12px; margin-bottom:20px;" onerror="this.src='./assets/cars/placeholder.png'">
    <h2 id="modalTitle" style="margin:0 0 4px;"></h2>
    <span id="modalTag" class="tag" style="margin-bottom:16px; display:inline-block;"></span>
    <table id="modalTable" style="width:100%; border-collapse:collapse; font-size:15px;"></table>
    <div style="display:flex; gap:12px; margin-top:24px;">
      <a id="modalViewBtn" href="#" class="linkBtn viewBtn" style="flex:1; text-align:center; padding:12px; text-decoration:none; font-weight:600; border-radius:12px;">View Details</a>
      <a id="modalBookBtn" href="#" class="linkBtn bookBtn" style="flex:1; text-align:center; padding:12px; text-decoration:none; font-weight:600; border-radius:12px; border:1px solid #ccc; color:black;">Book</a>
    </div>
  </div>
</div>

<script>
const API = window.location.hostname === "localhost"
  ? "http://localhost:10000"
  : "https://server-side-zqaz.onrender.com";
const params = new URLSearchParams(window.location.search);
const isPreview = params.get("preview") === "1";
const searchWhere = normalizeCity(params.get("where"));

function getWeekKey(date = new Date()) {
  const d = new Date(date);
  d.setHours(0, 0, 0, 0);
  const day = d.getDay();
  const diffToMonday = day === 0 ? -6 : 1 - day;
  d.setDate(d.getDate() + diffToMonday);
  return d.toISOString().slice(0, 10);
}
function popularityStorageKey() { return `popularity:${getWeekKey()}`; }
function loadPopularityMap() {
  const raw = localStorage.getItem(popularityStorageKey());
  const obj = raw ? JSON.parse(raw) : {};
  return obj && typeof obj === "object" ? obj : {};
}
function savePopularityMap(map) { localStorage.setItem(popularityStorageKey(), JSON.stringify(map)); }
function bumpPopularity(vehicleId, amount) {
  if (!vehicleId) return;
  const map = loadPopularityMap();
  const key = String(vehicleId);
  map[key] = Number(map[key] || 0) + Number(amount || 0);
  savePopularityMap(map);
}

const SESSION_MS = 12 * 60 * 60 * 1000;
function requireSession() {
  const email = localStorage.getItem("userEmail");
  const loggedInAt = Number(localStorage.getItem("loggedInAt") || "0");
  if (!email || !loggedInAt) { window.location.replace("index.html"); throw new Error("No session"); }
  if (Date.now() - loggedInAt > SESSION_MS) {
    localStorage.removeItem("userEmail");
    localStorage.removeItem("loggedInAt");
    localStorage.removeItem("isAdmin");
    window.location.replace("index.html");
    throw new Error("Session expired");
  }
  return email;
}
const userEmail = isPreview ? (localStorage.getItem("userEmail") || "preview@example.com") : requireSession();

function favStorageKey() { return `favs:${userEmail}`; }
function loadFavsSet() {
  const raw = localStorage.getItem(favStorageKey());
  const arr = raw ? JSON.parse(raw) : [];
  return new Set(Array.isArray(arr) ? arr : []);
}
function saveFavsSet(set) { localStorage.setItem(favStorageKey(), JSON.stringify([...set])); }

const imageMap = {
  "Dodge Challenger | AWD": "challenger.png",
  "KIA K4 | RWD": "kia.png",
  "Honda Civic | RWD": "civic.png",
  "Porsche 911 | AWD": "porsche.png",
  "Toyota Highlander | AWD": "highlander-awd.png",
  "Toyota Highlander | RWD": "highlander-rwd.png",
  "Toyota Corolla | FWD": "corolla-fwd.png",
  "Toyota Corolla | AWD": "corolla-awd.png"
};

let allCars = [], filteredCars = [];

function safeStr(v){ return (v ?? "").toString().trim(); }
function normalizeCity(v){
  return String(v || "")
    .trim()
    .toLowerCase()
    .replace(/,.*$/, "");
}
function carKeyFromParts(manufacturer, model, drivetrain, priceNum){
  const p = Number.isFinite(priceNum) ? priceNum.toFixed(2) : "NA";
  return `${manufacturer}|${model}|${drivetrain}|${p}`;
}

function normalizeCar(car){
  const id           = safeStr(car["Vehicle ID"] ?? car.vehicleId ?? car.id);
  const manufacturer = safeStr(car["Manufacturer"]);
  const model        = safeStr(car["Model"]);
  const type         = safeStr(car["Vehicle Type"]);
  const drivetrain   = safeStr(car["Drivetrain"]);
  const city         = safeStr(car["City"] ?? car.city ?? car["Available City"] ?? car.availableCity);
  const priceRaw     = car["Price"];
  const availability = car["Availability"];
  const isAvailable  = Number(availability) === 1;
  const priceNum     = Number(priceRaw);
  const cleanPriceNum = Number.isFinite(priceNum) ? priceNum : null;
  const priceText    = Number.isFinite(priceNum) ? `$${priceNum.toFixed(2)}/day` : `$${priceRaw}/day`;
  const name         = `${manufacturer} ${model}`.trim();
  const imgKey       = `${name} | ${drivetrain}`;
  const imgFile      = imageMap[imgKey] || "placeholder.png";
  const imgUrl       = `./assets/cars/${imgFile}`;
  const favKey       = carKeyFromParts(manufacturer, model, drivetrain, cleanPriceNum ?? NaN);
  return { id, manufacturer, model, type, drivetrain, city, isAvailable, priceText, imgKey, imgUrl, priceNum: cleanPriceNum, favKey };
}

// ── Href helpers ───────────────────────────────────────
function carDetailsHref(vehicleId) {
  if (!vehicleId) return "#";
  return `car-details.html?id=${encodeURIComponent(vehicleId)}${isPreview ? "&preview=1" : ""}`;
}
function carBookHref(vehicleId) {
  if (!vehicleId) return "#";
  return `car-details.html?id=${encodeURIComponent(vehicleId)}${isPreview ? "&preview=1" : ""}`;
}

// ── Modal ──────────────────────────────────────────────
function openModal(car) {
  const name = `${car.manufacturer} ${car.model}`.trim();
  document.getElementById("modalImg").src = car.imgUrl;
  document.getElementById("modalImg").alt = name;
  document.getElementById("modalTitle").textContent = name;
  const tag = document.getElementById("modalTag");
  tag.textContent = car.isAvailable ? "Available" : "Unavailable";
  tag.className = `tag ${car.isAvailable ? "available" : "unavailable"}`;
  const rows = [
    ["Manufacturer", car.manufacturer],
    ["Model",        car.model],
    ["City",         car.city || "—"],
    ["Type",         car.type],
    ["Drivetrain",   car.drivetrain],
    ["Price",        car.priceText],
    ["Vehicle ID",   car.id || "—"],
  ];
  document.getElementById("modalTable").innerHTML = rows.map(([label, val]) => `
    <tr style="border-bottom:1px solid #f1f5f9;">
      <td style="padding:10px 8px; color:#64748b; font-weight:600; width:40%;">${label}</td>
      <td style="padding:10px 8px;">${val || "—"}</td>
    </tr>
  `).join("");
  document.getElementById("modalViewBtn").href = carDetailsHref(car.id);
  document.getElementById("modalBookBtn").href = carBookHref(car.id);
  document.getElementById("modalViewBtn").setAttribute("data-vehicle-id", car.id || "");
  document.getElementById("modalBookBtn").setAttribute("data-vehicle-id", car.id || "");
  document.getElementById("vehicleModal").style.display = "flex";
}

function closeModal() { document.getElementById("vehicleModal").style.display = "none"; }

document.getElementById("vehicleModal").addEventListener("click", function(e) { if (e.target === this) closeModal(); });
document.addEventListener("keydown", function(e) { if (e.key === "Escape") closeModal(); });

document.getElementById("modalViewBtn").addEventListener("click", function(e) {
  const vehicleId = this.getAttribute("data-vehicle-id") || "";
  if (!vehicleId) return;
  e.preventDefault();
  bumpPopularity(vehicleId, 2);
  window.location.assign(carDetailsHref(vehicleId));
});

document.getElementById("modalBookBtn").addEventListener("click", function(e) {
  const vehicleId = this.getAttribute("data-vehicle-id") || "";
  if (!vehicleId) return;
  e.preventDefault();
  bumpPopularity(vehicleId, 4);
  window.location.assign(carBookHref(vehicleId));
});

async function loadCars() {
  const grid = document.getElementById("carsGrid");
  const subtitle = document.getElementById("carsSubtitle");
  grid.innerHTML = "<div style='color:#555;'>Loading cars…</div>";
  try {
    const endpoint = searchWhere ? `${API}/cars?where=${encodeURIComponent(params.get("where"))}` : `${API}/cars`;
    const res = await fetch(endpoint);
    const data = await res.json();
    const rawCars = Array.isArray(data) ? data : (data.cars ?? data.vehicles ?? []);
    allCars = rawCars.map(normalizeCar);
    if (subtitle) {
      subtitle.textContent = searchWhere
        ? `Showing cars in ${params.get("where")}`
        : "Live from SQL database";
    }
    const prices = allCars.map(c => c.priceNum).filter(n => Number.isFinite(n));
    const maxPrice = prices.length ? Math.max(...prices) : 2000;
    const slider = document.getElementById("filterPrice");
    if (slider) {
      slider.max = String(Math.ceil(maxPrice / 50) * 50);
      slider.value = slider.max;
      updatePriceLabel();
    }
    applyAllFilters();
  } catch (e) {
    console.error(e);
    document.getElementById("carsGrid").innerHTML = "<div style='color:#b91c1c;'>Failed to load cars.</div>";
  }
}

function renderCars(cars) {
  const grid = document.getElementById("carsGrid");
  grid.innerHTML = "";
  if (!cars.length) {
    grid.innerHTML = "<div style='color:#555;'>No cars match your search/filters.</div>";
    return;
  }
  const favs = loadFavsSet();
  cars.forEach((car) => {
    const tagClass = car.isAvailable ? "available" : "unavailable";
    const tagText  = car.isAvailable ? "Available" : "Unavailable";
    const name = `${car.manufacturer} ${car.model}`.trim();
    const isSaved = favs.has(car.favKey);
    const metaBits = [car.city, car.type, car.drivetrain].filter(Boolean);
    const card = document.createElement("div");
    card.className = "card";
    if (car.isAvailable) {
      card.classList.add("clickable");
      card.style.cursor = "pointer";
      card.addEventListener("click", (e) => {
        if (e.target.closest("a, button")) return;
        openModal(car);
      });
    }
    card.innerHTML = `
      <img src="${car.imgUrl}" alt="${car.imgKey}" onerror="this.src='./assets/cars/placeholder.png'">
      <div class="cardBody">
        <div class="headerRow">
          <div class="headerLeft">
            <h3>${name}</h3>
            <div class="meta">${metaBits.join(" • ") || "—"}</div>
          </div>
          <button class="heartBtn" type="button" data-favkey="${encodeURIComponent(car.favKey)}" data-vehicle-id="${encodeURIComponent(car.id || "")}">
            <svg viewBox="0 0 24 24" aria-hidden="true" preserveAspectRatio="xMidYMid meet">
              <path d="M12 21s-7-4.6-9.4-8.5C.7 9.6 2.2 6.5 5.5 6.1c1.8-.2 3.4.6 4.5 1.9 1.1-1.3 2.7-2.1 4.5-1.9 3.3.4 4.8 3.5 2.9 6.4C19 16.4 12 21 12 21z"
                    fill="${isSaved ? '#ef4444' : 'none'}" stroke="${isSaved ? '#ef4444' : '#64748b'}" stroke-width="1.8"/>
            </svg>
          </button>
        </div>
        <div class="price" style="margin-top:8px;">${car.priceText}</div>
        <span class="tag ${tagClass}" style="margin-top:10px; display:inline-block;">${tagText}</span>
        <div class="cardActions">
          <a class="linkBtn viewBtn" href="${carDetailsHref(car.id)}" data-vehicle-id="${car.id || ""}">View</a>
          <a class="linkBtn bookBtn" href="${carBookHref(car.id)}" data-vehicle-id="${car.id || ""}">Book</a>
        </div>
      </div>
    `;
    grid.appendChild(card);
  });

  grid.querySelectorAll(".viewBtn").forEach(link => {
    link.addEventListener("click", (e) => {
      const vehicleId = link.getAttribute("data-vehicle-id") || "";
      if (!vehicleId) return;
      e.preventDefault(); e.stopPropagation();
      bumpPopularity(vehicleId, 2);
      window.location.assign(carDetailsHref(vehicleId));
    });
  });

  grid.querySelectorAll(".bookBtn").forEach(link => {
    link.addEventListener("click", (e) => {
      const vehicleId = link.getAttribute("data-vehicle-id") || "";
      if (!vehicleId) return;
      e.preventDefault(); e.stopPropagation();
      bumpPopularity(vehicleId, 4);
      window.location.assign(carBookHref(vehicleId));
    });
  });

  grid.querySelectorAll(".heartBtn").forEach(btn => {
    btn.addEventListener("click", () => {
      const key = decodeURIComponent(btn.getAttribute("data-favkey") || "");
      const vehicleId = decodeURIComponent(btn.getAttribute("data-vehicle-id") || "");
      if (!key) return;
      const favs = loadFavsSet();
      const isSaved = favs.has(key);
      if (isSaved) favs.delete(key); else favs.add(key);
      saveFavsSet(favs);
      btn.classList.toggle("saved", !isSaved);
      const path = btn.querySelector("path");
      if (path) {
        path.setAttribute("fill", !isSaved ? "#ef4444" : "none");
        path.setAttribute("stroke", !isSaved ? "#ef4444" : "#64748b");
      }
      if (!isSaved && vehicleId) bumpPopularity(vehicleId, 1);
    });
  });
}

function getSearchQuery() { return (document.getElementById("searchInput")?.value || "").trim().toLowerCase(); }
function getSelectedType() { return (document.getElementById("filterType")?.value || "").trim(); }
function getSelectedDrive() { return (document.getElementById("filterDrive")?.value || "").trim(); }
function getMaxPrice() { const v = Number(document.getElementById("filterPrice")?.value); return Number.isFinite(v) ? v : Infinity; }
function updatePriceLabel() {
  const slider = document.getElementById("filterPrice");
  const label = document.getElementById("priceLabel");
  if (!slider || !label) return;
  const max = Number(slider.max), val = Number(slider.value);
  if (!Number.isFinite(val) || !Number.isFinite(max) || val >= max) label.textContent = "Any";
  else label.textContent = `$${val}`;
}

function applyAllFilters() {
  const q = getSearchQuery();
  const typeFilter = getSelectedType().toLowerCase();
  const driveFilter = getSelectedDrive().toLowerCase();
  const maxPrice = getMaxPrice();
  filteredCars = allCars.filter(c => {
    if (q) {
      const title = `${c.manufacturer} ${c.model}`.toLowerCase();
      const city = normalizeCity(c.city);
      if (!(title.includes(q) || city.includes(normalizeCity(q)) || (c.type||"").toLowerCase().includes(q) || (c.drivetrain||"").toLowerCase().includes(q))) return false;
    }
    if (searchWhere && !normalizeCity(c.city).includes(searchWhere)) return false;
    if (typeFilter && (c.type||"").toLowerCase() !== typeFilter) return false;
    if (driveFilter && (c.drivetrain||"").toLowerCase() !== driveFilter) return false;
    if (Number.isFinite(c.priceNum) && c.priceNum > maxPrice) return false;
    return true;
  });
  renderCars(filteredCars);
}

function wireUI() {
  document.getElementById("searchInput")?.addEventListener("input", applyAllFilters);
  const btn = document.getElementById("filterBtn");
  const panel = document.getElementById("filterPanel");
  btn?.addEventListener("click", () => {
    if (!panel) return;
    panel.style.display = (panel.style.display === "none" || !panel.style.display) ? "block" : "none";
  });
  document.getElementById("filterType")?.addEventListener("change", applyAllFilters);
  document.getElementById("filterDrive")?.addEventListener("change", applyAllFilters);
  document.getElementById("filterPrice")?.addEventListener("input", () => { updatePriceLabel(); applyAllFilters(); });
  document.getElementById("clearFilters")?.addEventListener("click", () => {
    const s = document.getElementById("searchInput");
    const t = document.getElementById("filterType");
    const d = document.getElementById("filterDrive");
    const p = document.getElementById("filterPrice");
    if (s) s.value = "";
    if (t) t.value = "";
    if (d) d.value = "";
    if (p) p.value = p.max;
    updatePriceLabel();
    applyAllFilters();
  });
  updatePriceLabel();
}

wireUI();
loadCars();
</script>

</body>
</html>
