<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cars</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; font-family: Inter, system-ui; }
    body { margin: 0; background: var(--bg, #f4f6f9); color: var(--ink, #0d1117); transition: background 0.2s, color 0.2s; }
    .container { max-width: 1400px; margin: auto; padding: 40px; }
    header { display: flex; justify-content: space-between; align-items: center; }
    h1 { font-size: 44px; margin: 0; color: var(--ink, #0d1117); }
    .sub { color: var(--muted, #555); font-size: 14px; }

    button { padding: 12px 18px; border-radius: 14px; border: none; cursor: pointer; transition: filter 0.15s; }
    button:hover { filter: brightness(0.95); }
    .primary { background: var(--accent, #4f46e5); color: white; }
    .secondary { background: var(--surface, white); border: 1px solid var(--border, #ccc); color: var(--ink, #0d1117); }

    .topRow { display: flex; justify-content: space-between; margin: 30px 0 12px; gap: 16px; }
    .searchBox {
      height: 46px; border-radius: 14px; border: 1px solid var(--border, #ddd);
      padding: 0 14px; width: 300px; background: var(--surface, white); color: var(--ink, #0d1117);
    }
    .searchBox::placeholder { color: var(--muted, #8891a0); }
    .criteriaBar { display: flex; flex-wrap: wrap; gap: 10px; margin: 0 0 22px; }
    .criteriaPill {
      padding: 8px 12px; border-radius: 999px; border: 1px solid var(--border, #ddd);
      background: var(--surface, white); color: var(--ink2, #475569); font-size: 13px; font-weight: 600;
    }

    #filterPanel {
      display: none; margin: 10px 0 22px; padding: 18px; border-radius: 18px;
      background: var(--surface, rgba(255,255,255,0.7));
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      border: 1px solid var(--border, rgba(148,163,184,0.35));
      box-shadow: 0 16px 45px rgba(15,23,42,0.1);
    }
    #filterPanel select {
      height: 44px; border-radius: 14px; border: 1px solid var(--border, rgba(148,163,184,0.45));
      background: var(--surface, rgba(255,255,255,0.95)); color: var(--ink, #0d1117);
      padding: 0 12px; min-width: 190px; outline: none;
      transition: box-shadow 0.15s ease, border-color 0.15s ease;
    }
    #filterPanel select:focus { border-color: rgba(79,70,229,0.55); box-shadow: 0 0 0 4px rgba(79,70,229,0.15); }
    #filterPanel input[type="range"] { width: 260px; height: 6px; border-radius: 999px; background: var(--border, rgba(148,163,184,0.35)); outline: none; }
    #filterPanel input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 18px; height: 18px; border-radius: 999px;
      background: var(--accent, #4f46e5); border: 2px solid white;
      box-shadow: 0 10px 18px rgba(79,70,229,0.25); cursor: pointer;
    }
    #filterPanel input[type="range"]::-moz-range-thumb {
      width: 18px; height: 18px; border-radius: 999px;
      background: var(--accent, #4f46e5); border: 2px solid white; cursor: pointer;
    }
    #clearFilters { border: 1px solid var(--border, rgba(148,163,184,0.55)); background: var(--surface, rgba(255,255,255,0.85)); color: var(--ink, #0d1117); }

    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
    .card {
      background: var(--surface, white); border-radius: 20px; overflow: hidden;
      box-shadow: 0 12px 30px rgba(0,0,0,0.06); position: relative;
      border: 1px solid var(--border, transparent);
    }
    .card img { width: 100%; height: 220px; object-fit: cover; background: var(--surface2, #ddd); }
    .card.clickable:hover { transform: translateY(-4px); box-shadow: 0 20px 40px rgba(79,70,229,0.15); transition: all 0.2s ease; }
    .cardBody { padding: 18px; }
    .headerRow { display: flex; justify-content: space-between; align-items: center; gap: 16px; }
    .headerLeft h3 { margin: 0; line-height: 1.2; color: var(--ink, #0d1117); }
    .headerLeft .meta { margin-top: 4px; }
    .price { font-weight: 600; color: var(--ink, #0d1117); }
    .meta { color: var(--muted, #555); font-size: 14px; }

    .tag { display: inline-block; padding: 6px 12px; border-radius: 999px; font-size: 12px; margin: 8px 0; }
    .available   { background: #dcfce7; color: #166534; }
    .unavailable { background: var(--danger-light, #fee2e2); color: var(--danger, #991b1b); }

    .cardActions { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
    .linkBtn { flex: 1; text-align: center; padding: 10px; border-radius: 12px; text-decoration: none; font-weight: 600; font-size: 13px; }
    .viewBtn { background: var(--accent, #4f46e5); color: white; }
    .bookBtn,
    a.bookBtn,
    a.linkBtn.bookBtn { background: #22c55e !important; color: white !important; border: none !important; }
    .compareBtn {
      flex: 1; text-align: center; padding: 10px; border-radius: 12px; font-weight: 600; font-size: 13px;
      border: 1px solid #c7d2fe; background: #eef2ff; color: #4f46e5; cursor: pointer; transition: all 0.15s;
    }
    .compareBtn.selected { background: #4f46e5; color: white; border-color: #4f46e5; }
    .compareBtn:disabled { opacity: 0.4; cursor: not-allowed; }
    .reviewsBtn {
      flex: 1; text-align: center; padding: 10px; border-radius: 12px; font-weight: 600; font-size: 13px;
      border: 1px solid var(--border, #cbd5e1); background: var(--surface2, #f8fafc);
      color: var(--ink, #0d1117); cursor: pointer;
    }

    .reviewsSection { margin-top: 14px; border-top: 1px solid var(--border, #e2e8f0); padding-top: 14px; display: none; }
    .reviewsSummary { font-size: 13px; color: var(--muted, #475569); margin-bottom: 10px; }
    .reviewList { display: flex; flex-direction: column; gap: 10px; margin-bottom: 12px; }
    .reviewItem { background: var(--surface2, #f8fafc); border: 1px solid var(--border, #e2e8f0); border-radius: 12px; padding: 10px 12px; }
    .reviewHead { display: flex; justify-content: space-between; align-items: center; gap: 10px; margin-bottom: 6px; font-size: 12px; }
    .reviewAuthor { font-weight: 700; color: var(--ink, #0d1117); }
    .reviewMeta { color: var(--muted, #64748b); }
    .reviewComment { font-size: 13px; color: var(--ink2, #334155); line-height: 1.5; white-space: pre-wrap; }
    .reviewForm { display: flex; flex-direction: column; gap: 10px; }
    .reviewForm textarea {
      width: 100%; border-radius: 12px; border: 1px solid var(--border, #cbd5e1);
      background: var(--surface, white); color: var(--ink, #0d1117); padding: 10px 12px; font-size: 13px;
      min-height: 88px; resize: vertical;
    }
    .reviewForm button { align-self: flex-start; padding: 10px 14px; border-radius: 10px; background: var(--accent, #4f46e5); color: white; border: none; font-weight: 700; }
    .reviewStatus { font-size: 12px; color: var(--muted, #64748b); }

    .starPicker { display: flex; gap: 4px; font-size: 26px; cursor: pointer; margin-bottom: 4px; }
    .starPicker span { color: #f59e0b; transition: transform 0.1s; user-select: none; }
    .starPicker span:hover { transform: scale(1.2); }
    .starPicker span.dim { color: #cbd5e1; }

    #vehicleModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
    .modalInner {
      background: var(--surface, white); border-radius: 20px; padding: 32px;
      max-width: 560px; width: 90%; max-height: 85vh; overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25); position: relative;
      border: 1px solid var(--border, transparent);
    }
    .modalClose { position: absolute; top: 16px; right: 16px; background: none; border: none; font-size: 22px; cursor: pointer; color: var(--muted, #64748b); padding: 4px 8px; }
    #modalTitle { margin: 0 0 4px; color: var(--ink, #0d1117); }
    .modalTableRow { border-bottom: 1px solid var(--border, #f1f5f9); }
    .modalTableLabel { padding: 10px 8px; color: var(--muted, #64748b); font-weight: 600; width: 40%; }
    .modalTableValue { padding: 10px 8px; color: var(--ink, #0d1117); }

    #compareBar {
      display: none; position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--surface); border-top: 2px solid var(--accent);
      padding: 14px 32px; z-index: 500;
      box-shadow: 0 -8px 30px rgba(0,0,0,0.12); align-items: center; gap: 20px;
    }
    .compareBar-slots { display: flex; gap: 12px; flex: 1; }
    .compareBar-slot {
      display: flex; align-items: center; gap: 10px; background: var(--surface2);
      border: 2px dashed var(--border); border-radius: 14px; padding: 10px 16px;
      min-width: 200px; font-size: 14px; color: var(--muted); font-weight: 500;
    }
    .compareBar-slot.filled { background: var(--accent-light); border-style: solid; border-color: var(--accent); color: var(--accent); font-weight: 600; }
    .compareBar-slot img { width: 48px; height: 36px; object-fit: cover; border-radius: 8px; }
    .compareBar-slot .slot-remove { margin-left: auto; cursor: pointer; font-size: 16px; opacity: 0.6; }
    .compareBar-slot .slot-remove:hover { opacity: 1; }
    .compareBar-actions { display: flex; gap: 10px; }
    .compareNowBtn { background: #4f46e5; color: white; border: none; border-radius: 12px; padding: 12px 24px; font-weight: 700; font-size: 14px; cursor: pointer; transition: opacity 0.15s; }
    .compareNowBtn:hover { opacity: 0.9; }
    .compareNowBtn:disabled { opacity: 0.4; cursor: not-allowed; }
    .compareClearBtn { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); border-radius: 12px; padding: 12px 18px; font-weight: 600; font-size: 14px; cursor: pointer; }

    #compareModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 2000; align-items: center; justify-content: center; padding: 20px; }
    .compareModalInner { background: var(--surface); border-radius: 24px; width: 100%; max-width: 820px; max-height: 90vh; overflow-y: auto; box-shadow: 0 24px 80px rgba(0,0,0,0.3); position: relative; }
    .compareModalHeader {
      padding: 24px 28px 16px; border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
      position: sticky; top: 0; background: var(--surface); z-index: 10; border-radius: 24px 24px 0 0;
    }
    .compareModalTitle { font-size: 20px; font-weight: 700; color: var(--ink); }
    .compareModalClose { background: none; border: none; font-size: 22px; cursor: pointer; color: #64748b; padding: 4px 8px; }
    .compareGrid { display: grid; grid-template-columns: 180px 1fr 1fr; gap: 0; }
    .compareGrid .col-label { padding: 12px 16px; font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; border-bottom: 1px solid var(--border); background: var(--surface2); display: flex; align-items: center; }
    .compareGrid .col-a,
    .compareGrid .col-b { padding: 12px 16px; border-bottom: 1px solid var(--border); font-size: 14px; color: var(--ink); font-weight: 500; display: flex; align-items: center; }
    .compareGrid .col-a { border-left: 1px solid #f1f5f9; }
    .compareGrid .col-header-label { background: var(--surface2); border-bottom: 2px solid var(--border); }
    .compareGrid .col-header-a,
    .compareGrid .col-header-b { padding: 16px; border-bottom: 2px solid var(--border); border-left: 1px solid var(--border); text-align: center; }
    .compareGrid .col-header-a img,
    .compareGrid .col-header-b img { width: 100%; height: 120px; object-fit: cover; border-radius: 12px; margin-bottom: 8px; }
    .compareGrid .car-title { font-size: 16px; font-weight: 700; color: var(--ink); }
    .compareGrid .car-price { font-size: 14px; color: #4f46e5; font-weight: 600; margin-top: 2px; }
    .compareGrid .highlight-better { background: #dcfce7; color: #166534; border-radius: 8px; padding: 2px 8px; font-weight: 700; }
    .compareGrid .row-even .col-label,
    .compareGrid .row-even .col-a,
    .compareGrid .row-even .col-b { background: var(--surface2); }
    .compareModalFooter { padding: 20px 28px; display: flex; gap: 12px; border-top: 1px solid var(--border); }
    .compareBookBtn { flex: 1; padding: 12px; border-radius: 12px; background: #4f46e5; color: white; border: none; font-weight: 700; font-size: 14px; cursor: pointer; text-decoration: none; text-align: center; display: block; transition: opacity 0.15s; }
    .compareBookBtn:hover { opacity: 0.9; }
    .compareBookBtn.secondary-book { background: var(--surface); color: var(--accent); border: 1px solid var(--border); }

    @media (max-width: 900px) {
      .grid { grid-template-columns: 1fr; }
      .topRow { flex-direction: column; align-items: stretch; }
      .searchBox { width: 100%; }
      .compareGrid { grid-template-columns: 120px 1fr 1fr; }
      #compareBar { padding: 12px 16px; flex-wrap: wrap; }
    }
  </style>
</head>

<body>
  <div class="container">

    <header style="margin-top: 20px;">
      <div>
        <h1>Cars</h1>
        <div class="sub" id="carsSubtitle">
          <span id="availableCount">—</span> available vehicles • Updated in real-time
        </div>
      </div>
    </header>

    <div class="topRow">
      <input id="searchInput" class="searchBox" placeholder="Search by make/model" />
      <button id="filterBtn" class="secondary" type="button">Filter</button>
    </div>

    <div class="criteriaBar" id="criteriaBar">
      <span class="criteriaPill" id="criteriaWhere">Where: (any)</span>
      <span class="criteriaPill" id="criteriaPickup">Pick Up: (any)</span>
      <span class="criteriaPill" id="criteriaDropoff">Drop Off: (any)</span>
    </div>

    <div id="filterPanel">
      <div style="display:flex; gap:16px; flex-wrap:wrap; align-items:end;">
        <div>
          <div class="sub" style="margin-bottom:6px;">Vehicle Type</div>
          <select id="filterType">
            <option value="">Any</option>
            <option value="Sedan">Sedan</option>
            <option value="SUV">SUV</option>
            <option value="Sport">Sport</option>
            <option value="Truck">Truck</option>
          </select>
        </div>
        <div>
          <div class="sub" style="margin-bottom:6px;">Drivetrain</div>
          <select id="filterDrive">
            <option value="">Any</option>
            <option value="AWD">AWD</option>
            <option value="FWD">FWD</option>
            <option value="RWD">RWD</option>
            <option value="4x4">4×4</option>
          </select>
        </div>
        <div style="min-width:260px;">
          <div class="sub" style="margin-bottom:6px;">Max price: <span id="priceLabel">Any</span></div>
          <input id="filterPrice" type="range" min="0" max="2000" step="50" value="2000" />
        </div>
        <div>
          <button id="clearFilters" class="secondary" type="button">Clear</button>
        </div>
      </div>
    </div>

    <div class="grid" id="carsGrid"></div>

    <div id="loadMoreWrap" style="display:none; justify-content:center; align-items:center; gap:14px; margin-top:24px; flex-wrap:wrap;">
      <div id="resultsMeta" class="sub"></div>
      <button id="loadMoreBtn" class="secondary" type="button">Load More</button>
    </div>

  </div>

  <div id="vehicleModal">
    <div class="modalInner">
      <button class="modalClose" onclick="closeModal()">✕</button>
      <img id="modalImg" src="" alt=""
        style="width:100%; height:200px; object-fit:cover; border-radius:12px; margin-bottom:20px;"
        onerror="this.src='./assets/cars/dummy.png'" />
      <h2 id="modalTitle"></h2>
      <span id="modalTag" class="tag" style="margin-bottom:16px; display:inline-block;"></span>
      <table id="modalTable" style="width:100%; border-collapse:collapse; font-size:15px;"></table>
      <div style="display:flex; gap:12px; margin-top:24px;">
        <a id="modalViewBtn" href="#" class="linkBtn viewBtn" style="flex:1; text-align:center; padding:12px; text-decoration:none; font-weight:600; border-radius:12px;">View Details</a>
        <a id="modalBookBtn" href="#" class="linkBtn bookBtn" style="flex:1; text-align:center; padding:12px; text-decoration:none; font-weight:600; border-radius:12px;">Book</a>
      </div>
    </div>
  </div>

  <div id="compareBar">
    <div class="compareBar-slots">
      <div class="compareBar-slot" id="compareSlot0"><span>Select a car to compare</span></div>
      <div style="display:flex; align-items:center; color:#94a3b8; font-weight:700; font-size:18px;">VS</div>
      <div class="compareBar-slot" id="compareSlot1"><span>Select a car to compare</span></div>
    </div>
    <div class="compareBar-actions">
      <button class="compareNowBtn" id="compareNowBtn" disabled onclick="openCompareModal()">Compare Now →</button>
      <button class="compareClearBtn" onclick="clearCompare()">Clear</button>
    </div>
  </div>

  <div id="compareModal">
    <div class="compareModalInner">
      <div class="compareModalHeader">
        <div class="compareModalTitle">🚗 Side-by-Side Comparison</div>
        <button class="compareModalClose" onclick="closeCompareModal()">✕</button>
      </div>
      <div id="compareContent"></div>
      <div class="compareModalFooter" id="compareFooter"></div>
    </div>
  </div>

  <script>

  <script>
    const API = window.location.hostname === "localhost"
      ? "http://localhost:10000"
      : "https://server-side-zqaz.onrender.com";

    const params    = new URLSearchParams(window.location.search);
    const isPreview = params.get("preview") === "1";

    const searchState = {
      where:    (params.get("where")    || "").trim(),
      pickup:   (params.get("pickup")   || "").trim(),
      dropoff:  (params.get("dropoff")  || "").trim(),
      q:        (params.get("q")        || "").trim(),
      type:     (params.get("type")     || "").trim(),
      drive:    (params.get("drive")    || "").trim(),
      maxPrice: (params.get("maxPrice") || "").trim(),
    };

    const SESSION_MS = 12 * 60 * 60 * 1000;
    const PAGE_SIZE  = 24;

    function requireSession() {
      const email      = localStorage.getItem("userEmail");
      const loggedInAt = Number(localStorage.getItem("loggedInAt") || localStorage.getItem("lastLoginAt") || "0");
      if (!email || !loggedInAt) { window.location.replace("index.html"); throw new Error("No session"); }
      if (Date.now() - loggedInAt > SESSION_MS) {
        ["userEmail", "loggedInAt", "lastLoginAt", "isAdmin"].forEach(k => localStorage.removeItem(k));
        window.location.replace("index.html");
        throw new Error("Session expired");
      }
      return email;
    }

    const userEmail = isPreview
      ? (localStorage.getItem("userEmail") || "preview@example.com")
      : requireSession();

    const IMAGE_ASSIGNMENTS_KEY = "carImageAssignments";
    function loadImageAssignments() { const r = localStorage.getItem(IMAGE_ASSIGNMENTS_KEY); return r ? JSON.parse(r) : {}; }
    function saveImageAssignments(a) { localStorage.setItem(IMAGE_ASSIGNMENTS_KEY, JSON.stringify(a)); }
    function normalizeModelKeyPart(v) { return String(v || "").toLowerCase().replace(/\s+/g, " ").trim(); }
    function buildValidImageUrls(k) { return new Set((IMAGE_MANIFEST[k] || []).map(i => `./assets/cars/${k}/${i.num}.${i.ext}`)); }
    function getOrCreateImageAssignment(vehicleId, manufacturer, model) {
      if (!vehicleId || !manufacturer || !model) return "./assets/cars/dummy.png";
      const modelKey = `${normalizeModelKeyPart(manufacturer)}/${normalizeModelKeyPart(model)}`;
      const assignments = loadImageAssignments();
      const valid = buildValidImageUrls(modelKey);
      if (assignments[vehicleId]) {
        if (!valid.size || valid.has(assignments[vehicleId])) return assignments[vehicleId];
        delete assignments[vehicleId]; saveImageAssignments(assignments);
      }
      const available = IMAGE_MANIFEST[modelKey] || [];
      if (!available.length) return `https://source.unsplash.com/seed/${encodeURIComponent(vehicleId)}/600x400/?${encodeURIComponent(manufacturer + " " + model + " car")}`;
      const used = new Set(Object.entries(assignments).filter(([vid]) => vid !== vehicleId).map(([,url]) => url).filter(url => valid.has(url)));
      const pool = available.filter(i => !used.has(`./assets/cars/${modelKey}/${i.num}.${i.ext}`));
      const chosen = (pool.length ? pool : available)[Math.floor(Math.random() * (pool.length || available.length))];
      const url = `./assets/cars/${modelKey}/${chosen.num}.${chosen.ext}`;
      assignments[vehicleId] = url; saveImageAssignments(assignments);
      return url;
    }

    function favStorageKey()  { return `favs:${userEmail}`; }
    function loadFavsSet()    { const r = localStorage.getItem(favStorageKey()); const a = r ? JSON.parse(r) : []; return new Set(Array.isArray(a) ? a : []); }
    function saveFavsSet(s)   { localStorage.setItem(favStorageKey(), JSON.stringify([...s])); }
    function carKeyFromParts(manufacturer, model, drivetrain, priceNum) {
      return `${manufacturer}|${model}|${drivetrain}|${Number.isFinite(priceNum) ? priceNum.toFixed(2) : "NA"}`;
    }

    function getWeekKey() { const d = new Date(); d.setHours(0,0,0,0); const day=d.getDay(), diff=day===0?-6:1-day; d.setDate(d.getDate()+diff); return d.toISOString().slice(0,10); }
    function loadPopularityMap() { const r = localStorage.getItem(`popularity:${getWeekKey()}`); const o = r ? JSON.parse(r) : {}; return o && typeof o==="object" ? o : {}; }
    function savePopularityMap(m) { localStorage.setItem(`popularity:${getWeekKey()}`, JSON.stringify(m)); }
    function bumpPopularity(vid, amt) { if (!vid) return; const m = loadPopularityMap(); m[String(vid)] = Number(m[String(vid)]||0)+Number(amt||0); savePopularityMap(m); }
    async function postMetricInteraction(vid, eventType) {
      if (!vid) return;
      try { await fetch(`${API}/metrics/interaction`, { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({vehicleId:Number(vid),eventType}) }); } catch {}
    }
    async function postFavouriteMetric(vid, isFav) {
      if (!vid) return;
      try { await fetch(`${API}/metrics/favourites`, { method:"POST", headers:{"Content-Type":"application/json","X-User-Email":userEmail}, body:JSON.stringify({vehicleId:Number(vid),isFavourite:isFav}) }); } catch {}
    }

    const reviewCache = new Map();
    const openReviewSections = new Set();
    const LOCAL_REVIEW_STORAGE_KEY = "vehicleReviewsLocal";

    function escapeHtml(v) { return String(v??"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;"); }
    function formatReviewDate(v) { if (!v) return ""; const d=new Date(v); return isNaN(d)?""  :d.toLocaleDateString("en-CA",{year:"numeric",month:"short",day:"numeric"}); }
    function loadLocalReviewStore() { try { const r=localStorage.getItem(LOCAL_REVIEW_STORAGE_KEY); const p=r?JSON.parse(r):{}; return p&&typeof p==="object"?p:{}; } catch { return {}; } }
    function saveLocalReviewStore(s) { localStorage.setItem(LOCAL_REVIEW_STORAGE_KEY, JSON.stringify(s)); }
    function buildLocalReviewPayload(rows) {
      const s = Array.isArray(rows) ? rows : [];
      return { reviewCount: s.length, averageRating: s.length ? s.reduce((a,r)=>a+Number(r.rating||0),0)/s.length : 0, rows: s };
    }
    function getLocalReviewData(vid) {
      const store = loadLocalReviewStore();
      const rows  = Array.isArray(store[String(vid)]) ? store[String(vid)] : [];
      return buildLocalReviewPayload(rows.slice().sort((a,b)=>String(b.updatedAt||"").localeCompare(String(a.updatedAt||""))));
    }
    function saveLocalReview(vid, rating, comment) {
      const email = String(localStorage.getItem("userEmail")||"");
      const key = String(vid||""), store = loadLocalReviewStore(), rows = Array.isArray(store[key])?store[key]:[];
      const ts = new Date().toISOString();
      const ud = (() => { try { return JSON.parse(localStorage.getItem("userData")||"{}"); } catch { return {}; } })();
      const authorName = [ud.firstName||ud["First Name"],ud.lastName||ud["Last Name"]].filter(Boolean).join(" ").trim()||email||"Local User";
      const next = rows.filter(r=>String(r.userEmail||"")!==email);
      next.unshift({rating,comment,authorName,userEmail:email,createdAt:ts,updatedAt:ts});
      store[key]=next; saveLocalReviewStore(store);
      return buildLocalReviewPayload(next);
    }

    async function fetchVehicleReviews(vid, {force=false}={}) {
      const key = String(vid||"");
      if (!key) return {reviewCount:0,averageRating:0,rows:[]};
      if (!force && reviewCache.has(key)) return reviewCache.get(key);
      try {
        const res = await fetch(`${API}/cars/${encodeURIComponent(vid)}/reviews`);
        const data = await res.json().catch(()=>({}));
        if (!res.ok) {
          if (isPreview && res.status===404) { const n=getLocalReviewData(vid); reviewCache.set(key,n); return n; }
          throw new Error(data.error||"Could not load reviews");
        }
        const n = {reviewCount:Number(data.reviewCount||0),averageRating:Number(data.averageRating||0),rows:Array.isArray(data.rows)?data.rows:[]};
        reviewCache.set(key,n); return n;
      } catch(err) {
        if (isPreview && err instanceof TypeError) { const n=getLocalReviewData(vid); reviewCache.set(key,n); return n; }
        throw err;
      }
    }

    function buildReviewSectionHtml(vid, data) {
      if (data?.unavailable) return `<div class="reviewStatus">Reviews are temporarily unavailable. Please try again later.</div>`;
      const rows = Array.isArray(data?.rows) ? data.rows : [];
      const summary = data?.reviewCount
        ? `⭐ ${Number(data.averageRating||0).toFixed(1)} average from ${data.reviewCount} review(s)`
        : "No reviews yet for this vehicle.";
      const items = rows.length
        ? rows.map(r=>`
            <div class="reviewItem">
              <div class="reviewHead">
                <div class="reviewAuthor">${escapeHtml(r.authorName||`User #${r.userId||"—"}`)}</div>
                <div class="reviewMeta">${"★".repeat(Number(r.rating||0))}${"☆".repeat(Math.max(0,5-Number(r.rating||0)))} • ${escapeHtml(formatReviewDate(r.updatedAt||r.createdAt))}</div>
              </div>
              <div class="reviewComment">${escapeHtml(r.comment||"")}</div>
            </div>`).join("")
        : `<div class="reviewItem"><div class="reviewComment">Be the first to leave feedback.</div></div>`;

      const canReview = Boolean(localStorage.getItem("userEmail"));
      const form = canReview
        ? `<div class="reviewForm">
            <div class="starPicker" data-rating="5">
              <span data-val="1">★</span><span data-val="2">★</span><span data-val="3">★</span>
              <span data-val="4">★</span><span data-val="5">★</span>
            </div>
            <input type="hidden" class="reviewRating" value="5" />
            <textarea class="reviewCommentInput" placeholder="Share your experience with this vehicle..."></textarea>
            <button type="button" class="reviewSubmitBtn" data-vehicle-id="${escapeHtml(vid)}">Post Review</button>
            <div class="reviewStatus"></div>
          </div>`
        : `<div class="reviewStatus">Sign in to leave a review.</div>`;

      return `<div class="reviewsSummary">${summary}</div><div class="reviewList">${items}</div>${form}`;
    }

    function renderReviewSection(sectionEl, vid, data) {
      if (!sectionEl) return;
      sectionEl.innerHTML = buildReviewSectionHtml(vid, data);
      sectionEl.style.display = "block";

      const starPicker  = sectionEl.querySelector(".starPicker");
      const ratingInput = sectionEl.querySelector(".reviewRating");
      if (starPicker && ratingInput) {
        const stars = starPicker.querySelectorAll("span");
        function updateStars(val) {
          stars.forEach(s => s.classList.toggle("dim", Number(s.dataset.val) > val));
          starPicker.dataset.rating = val;
          ratingInput.value = val;
        }
        stars.forEach(s => {
          s.addEventListener("click",       e => { e.stopPropagation(); updateStars(Number(s.dataset.val)); });
          s.addEventListener("mouseenter",  () => updateStars(Number(s.dataset.val)));
        });
        starPicker.addEventListener("mouseleave", () => updateStars(Number(ratingInput.value)));
        updateStars(5);
      }

      const submitBtn = sectionEl.querySelector(".reviewSubmitBtn");
      if (submitBtn) {
        submitBtn.addEventListener("click", e => { e.preventDefault(); e.stopPropagation(); submitVehicleReview(vid, sectionEl, submitBtn); });
      }
    }

    async function toggleReviews(vid, sectionEl) {
      const key = String(vid||"");
      if (!key || !sectionEl) return;
      if (sectionEl.style.display === "block") {
        openReviewSections.delete(key);
        sectionEl.style.display = "none";
        return;
      }
      openReviewSections.add(key);
      sectionEl.style.display = "block";
      sectionEl.innerHTML = `<div class="reviewStatus">Loading reviews...</div>`;
      try {
        const data = await fetchVehicleReviews(vid);
        renderReviewSection(sectionEl, vid, data);
      } catch {
        sectionEl.innerHTML = buildReviewSectionHtml(vid, {unavailable:true});
      }
    }

    async function submitVehicleReview(vid, sectionEl, buttonEl) {
      if (!vid||!sectionEl||!buttonEl) return;
      const ratingEl  = sectionEl.querySelector(".reviewRating");
      const commentEl = sectionEl.querySelector(".reviewCommentInput");
      const statusEl  = sectionEl.querySelector(".reviewStatus");
      const rating    = Number(ratingEl?.value||0);
      const comment   = String(commentEl?.value||"").trim();
      if (!localStorage.getItem("userEmail"))                    { if (statusEl) statusEl.textContent="Sign in to leave a review."; return; }
      if (!Number.isFinite(rating)||rating<1||rating>5)          { if (statusEl) statusEl.textContent="Choose a rating between 1 and 5."; return; }
      if (comment.length<3)                                      { if (statusEl) statusEl.textContent="Comment must be at least 3 characters."; return; }
      buttonEl.disabled=true; if (statusEl) statusEl.textContent="Posting review...";
      try {
        const res  = await fetch(`${API}/cars/${encodeURIComponent(vid)}/reviews`, {
          method:"POST", headers:{"Content-Type":"application/json","X-User-Email":localStorage.getItem("userEmail")},
          body:JSON.stringify({rating,comment}),
        });
        const data = await res.json().catch(()=>({}));
        if (!res.ok) {
          if (isPreview&&res.status===404) { const ld=saveLocalReview(vid,rating,comment); reviewCache.set(String(vid),ld); renderReviewSection(sectionEl,vid,ld); const ns=sectionEl.querySelector(".reviewStatus"); if(ns) ns.textContent="Review saved locally."; return; }
          if (res.status===404||res.status>=500) { if(statusEl) statusEl.textContent="Reviews are temporarily unavailable. Please try again later."; return; }
          throw new Error(data.error||"Could not post review");
        }
        const refreshed = await fetchVehicleReviews(vid, {force:true});
        renderReviewSection(sectionEl, vid, refreshed);
        const ns=sectionEl.querySelector(".reviewStatus"); if(ns) ns.textContent="Review saved.";
      } catch(err) {
        if (isPreview&&err instanceof TypeError) { const ld=saveLocalReview(vid,rating,comment); reviewCache.set(String(vid),ld); renderReviewSection(sectionEl,vid,ld); const ns=sectionEl.querySelector(".reviewStatus"); if(ns) ns.textContent="Review saved locally."; return; }
        if (statusEl) statusEl.textContent="Reviews are temporarily unavailable. Please try again later.";
      } finally { buttonEl.disabled=false; }
    }

    let compareList = [];
    function updateCompareBar() {
      const bar = document.getElementById("compareBar"), btn = document.getElementById("compareNowBtn");
      bar.style.display = "flex";
      [0,1].forEach(i => {
        const slot=document.getElementById(`compareSlot${i}`), car=compareList[i];
        if (car) { slot.className="compareBar-slot filled"; slot.innerHTML=`<img src="${car.imgUrl}" alt="${car.manufacturer}" onerror="this.src='./assets/cars/dummy.png'"><span>${car.manufacturer} ${car.model}</span><span class="slot-remove" onclick="removeFromCompare('${car.id}')">✕</span>`; }
        else     { slot.className="compareBar-slot"; slot.innerHTML=`<span>Select a car to compare</span>`; }
      });
      btn.disabled = compareList.length<2;
      document.querySelectorAll(".compareBtn").forEach(b => {
        const id=b.getAttribute("data-compare-id"), inList=compareList.some(c=>c.id===id);
        b.classList.toggle("selected",inList); b.textContent=inList?"✓ Comparing":"Compare"; b.disabled=compareList.length>=2&&!inList;
      });
    }
    function toggleCompare(car) { const i=compareList.findIndex(c=>c.id===car.id); if(i>-1){compareList.splice(i,1);}else{if(compareList.length>=2)return;compareList.push(car);} updateCompareBar(); }
    function removeFromCompare(id) { compareList=compareList.filter(c=>c.id!==id); updateCompareBar(); }
    function clearCompare()        { compareList=[]; updateCompareBar(); }

    function openCompareModal() {
      if (compareList.length<2) return;
      const [a,b]=compareList, nameA=`${a.manufacturer} ${a.model}`.trim(), nameB=`${b.manufacturer} ${b.model}`.trim();
      const specs=[
        {label:"Price/Day",keyA:a.priceText,keyB:b.priceText,compare:true,rawA:a.priceNum,rawB:b.priceNum,lowerIsBetter:true},
        {label:"Type",keyA:a.type,keyB:b.type},{label:"Drivetrain",keyA:a.drivetrain,keyB:b.drivetrain},
        {label:"City",keyA:a.city||"—",keyB:b.city||"—"},
        {label:"Availability",keyA:a.isAvailable?"✅ Available":"❌ Unavailable",keyB:b.isAvailable?"✅ Available":"❌ Unavailable"},
        {label:"Vehicle ID",keyA:a.id||"—",keyB:b.id||"—"},
      ];
      const rows=specs.map((s,i)=>{
        let vA=s.keyA||"—",vB=s.keyB||"—",hA="",hB="";
        if(s.compare&&s.rawA!=null&&s.rawB!=null){if(s.lowerIsBetter){if(s.rawA<s.rawB)hA="highlight-better";else if(s.rawB<s.rawA)hB="highlight-better";}else{if(s.rawA>s.rawB)hA="highlight-better";else if(s.rawB>s.rawA)hB="highlight-better";}}
        const rc=i%2===0?"row-even":"";
        return `<div class="col-label ${rc}">${s.label}</div><div class="col-a ${rc}"><span class="${hA}">${vA}</span></div><div class="col-b ${rc}"><span class="${hB}">${vB}</span></div>`;
      }).join("");
      document.getElementById("compareContent").innerHTML=`<div class="compareGrid"><div class="col-header-label"></div><div class="col-header-a"><img src="${a.imgUrl}" alt="${nameA}" onerror="this.src='./assets/cars/dummy.png'"><div class="car-title">${nameA}</div><div class="car-price">${a.priceText}</div></div><div class="col-header-b"><img src="${b.imgUrl}" alt="${nameB}" onerror="this.src='./assets/cars/dummy.png'"><div class="car-title">${nameB}</div><div class="car-price">${b.priceText}</div></div>${rows}</div>`;
      document.getElementById("compareFooter").innerHTML=`<a href="${carBookHref(a.id)}" class="compareBookBtn">Book ${nameA}</a><a href="${carBookHref(b.id)}" class="compareBookBtn secondary-book">Book ${nameB}</a>`;
      document.getElementById("compareModal").style.display="flex";
    }
    function closeCompareModal() { document.getElementById("compareModal").style.display="none"; }
    document.getElementById("compareModal").addEventListener("click", function(e){if(e.target===this)closeCompareModal();});

    function safeStr(v) { return (v??"").toString().trim(); }
    function normalizeCar(car) {
      const id           = safeStr(car["Vehicle ID"]??car.vehicleId??car.id);
      const manufacturer = safeStr(car["Manufacturer"]);
      const model        = safeStr(car["Model"]);
      const type         = safeStr(car["Vehicle Type"]);
      const drivetrain   = safeStr(car["Drivetrain"]);
      const city         = safeStr(car["City"]??car.city??car["Available City"]??car.availableCity);
      const priceNum     = Number(car["Price"]);
      const isAvailable  = Number(car["Availability"])===1;
      const cleanPrice   = Number.isFinite(priceNum)?priceNum:null;
      const priceText    = Number.isFinite(priceNum)?`$${priceNum.toFixed(2)}/day`:`$${car["Price"]}/day`;
      const imgUrl       = getOrCreateImageAssignment(id,manufacturer,model);
      const favKey       = carKeyFromParts(manufacturer,model,drivetrain,cleanPrice??NaN);
      return {id,manufacturer,model,type,drivetrain,city,isAvailable,priceText,imgUrl,priceNum:cleanPrice,favKey};
    }
    function carDetailsHref(vid) { if(!vid)return"#"; return `car-details.html?id=${encodeURIComponent(vid)}${isPreview?"&preview=1":""}`; }
    function carBookHref(vid) { return carDetailsHref(vid); }

    function openModal(car) {
      const name=`${car.manufacturer} ${car.model}`.trim();
      document.getElementById("modalImg").src=car.imgUrl; document.getElementById("modalImg").alt=name;
      document.getElementById("modalTitle").textContent=name;
      const tag=document.getElementById("modalTag"); tag.textContent=car.isAvailable?"Available":"Unavailable"; tag.className=`tag ${car.isAvailable?"available":"unavailable"}`;
      document.getElementById("modalTable").innerHTML=[["Manufacturer",car.manufacturer],["Model",car.model],["City",car.city||"—"],["Type",car.type],["Drivetrain",car.drivetrain],["Price",car.priceText],["Vehicle ID",car.id||"—"]]
        .map(([l,v])=>`<tr class="modalTableRow"><td class="modalTableLabel">${l}</td><td class="modalTableValue">${v||"—"}</td></tr>`).join("");
      document.getElementById("modalViewBtn").href=carDetailsHref(car.id); document.getElementById("modalBookBtn").href=carBookHref(car.id);
      document.getElementById("modalViewBtn").setAttribute("data-vehicle-id",car.id||""); document.getElementById("modalBookBtn").setAttribute("data-vehicle-id",car.id||"");
      document.getElementById("vehicleModal").style.display="flex";
    }
    function closeModal() { document.getElementById("vehicleModal").style.display="none"; }
    document.getElementById("vehicleModal").addEventListener("click",function(e){if(e.target===this)closeModal();});
    document.addEventListener("keydown",e=>{if(e.key==="Escape"){closeModal();closeCompareModal();}});
    document.getElementById("modalViewBtn").addEventListener("click",function(e){const vid=this.getAttribute("data-vehicle-id")||"";if(!vid)return;e.preventDefault();bumpPopularity(vid,2);postMetricInteraction(vid,"view");window.location.assign(carDetailsHref(vid));});
    document.getElementById("modalBookBtn").addEventListener("click",function(e){const vid=this.getAttribute("data-vehicle-id")||"";if(!vid)return;e.preventDefault();bumpPopularity(vid,4);postMetricInteraction(vid,"book_click");window.location.assign(carBookHref(vid));});

    let allCars=[], totalCars=0, currentPage=1;
    let carsListAbort = null;

    function renderCars(cars) {
      openReviewSections.clear();

      const grid=document.getElementById("carsGrid"), loadMoreWrap=document.getElementById("loadMoreWrap"), loadMoreBtn=document.getElementById("loadMoreBtn"), resultsMeta=document.getElementById("resultsMeta");
      grid.innerHTML="";
      if (!cars.length) { if(loadMoreWrap)loadMoreWrap.style.display="none"; grid.innerHTML=`<div style="color:var(--muted,#555);">No cars match your search/filters.</div>`; return; }

      cars.forEach(car => {
        const tagClass=car.isAvailable?"available":"unavailable", tagText=car.isAvailable?"Available":"Unavailable";
        const name=`${car.manufacturer} ${car.model}`.trim(), metaBits=[car.city,car.type,car.drivetrain].filter(Boolean);
        const isFav=loadFavsSet().has(car.favKey), inCompare=compareList.some(c=>c.id===car.id), cmpDisabled=compareList.length>=2&&!inCompare;

        const card=document.createElement("div"); card.className="card";
        if (car.isAvailable) {
          card.classList.add("clickable"); card.style.cursor="pointer";
          card.addEventListener("click", e => {
            if (e.target.closest("a, button, textarea, select, input, .reviewsSection")) return;
            openModal(car);
          });
        }

        card.innerHTML=`
          <div class="favBtn" data-fav-key="${car.favKey}" data-vehicle-id="${car.id||""}"
            style="position:absolute;top:12px;right:12px;background:rgba(255,255,255,0.9);border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:20px;box-shadow:0 4px 10px rgba(0,0,0,0.1);z-index:10;transition:transform 0.2s;user-select:none;">
            ${isFav?"❤️":"🤍"}
          </div>
          <img src="${car.imgUrl}" alt="${name}" onerror="this.src='./assets/cars/dummy.png'">
          <div class="cardBody">
            <div class="headerRow"><div class="headerLeft"><h3>${name}</h3><div class="meta">${metaBits.join(" • ")||"—"}</div></div></div>
            <div class="price" style="margin-top:8px;">${car.priceText}</div>
            <span class="tag ${tagClass}" style="margin-top:10px;display:inline-block;">${tagText}</span>
            <div class="cardActions">
              <a class="linkBtn viewBtn" href="${carDetailsHref(car.id)}" data-vehicle-id="${car.id||""}">View</a>
              <a class="linkBtn bookBtn" href="${carBookHref(car.id)}"    data-vehicle-id="${car.id||""}">Book</a>
              <button class="reviewsBtn" type="button" data-vehicle-id="${car.id||""}">Reviews</button>
              <button class="compareBtn ${inCompare?"selected":""}" data-compare-id="${car.id}" ${cmpDisabled?"disabled":""}>
                ${inCompare?"✓ Comparing":"Compare"}
              </button>
            </div>
            <div class="reviewsSection" data-review-section="${car.id||""}"></div>
          </div>`;

        grid.appendChild(card);
      });

      grid.querySelectorAll(".favBtn").forEach(btn => {
        btn.addEventListener("click", e => {
          e.preventDefault(); e.stopPropagation();
          const key=btn.getAttribute("data-fav-key"); if(!key)return;
          const vid=btn.getAttribute("data-vehicle-id")||"", favs=loadFavsSet();
          if(favs.has(key)){favs.delete(key);btn.innerHTML="🤍";postFavouriteMetric(vid,false);}
          else{favs.add(key);btn.innerHTML="❤️";btn.style.transform="scale(1.2)";setTimeout(()=>btn.style.transform="scale(1)",200);postFavouriteMetric(vid,true);}
          saveFavsSet(favs);
        });
      });

      grid.querySelectorAll(".viewBtn").forEach(link => {
        link.addEventListener("click", e => { const vid=link.getAttribute("data-vehicle-id")||""; if(!vid)return; e.preventDefault();e.stopPropagation(); bumpPopularity(vid,2);postMetricInteraction(vid,"view");window.location.assign(carDetailsHref(vid)); });
      });
      grid.querySelectorAll(".bookBtn").forEach(link => {
        link.addEventListener("click", e => { const vid=link.getAttribute("data-vehicle-id")||""; if(!vid)return; e.preventDefault();e.stopPropagation(); bumpPopularity(vid,4);postMetricInteraction(vid,"book_click");window.location.assign(carBookHref(vid)); });
      });

      grid.querySelectorAll(".reviewsBtn").forEach(btn => {
        btn.addEventListener("click", e => {
          e.preventDefault(); e.stopPropagation();
          const vid=btn.getAttribute("data-vehicle-id")||"";
          const section=btn.closest(".cardBody")?.querySelector(`.reviewsSection[data-review-section="${CSS.escape(vid)}"]`);
          toggleReviews(vid,section);
        });
      });

      grid.querySelectorAll(".compareBtn").forEach(btn => {
        btn.addEventListener("click", e => {
          e.preventDefault(); e.stopPropagation();
          const id=btn.getAttribute("data-compare-id"), car=cars.find(c=>c.id===id)||allCars.find(c=>c.id===id);
          if(car)toggleCompare(car);
        });
      });

      if (loadMoreWrap&&loadMoreBtn&&resultsMeta) {
        resultsMeta.textContent=`Showing ${cars.length} of ${totalCars||cars.length} cars`;
        loadMoreWrap.style.display="flex"; loadMoreBtn.style.display=cars.length<(totalCars||cars.length)?"inline-block":"none";
      }
    }

    function getSearchQuery()   { return (document.getElementById("searchInput")?.value||"").trim().toLowerCase(); }
    function getSelectedType()  { return (document.getElementById("filterType")?.value||"").trim(); }
    function getSelectedDrive() { return (document.getElementById("filterDrive")?.value||"").trim(); }
    function getMaxPrice() {
      const s = document.getElementById("filterPrice");
      const v = Number(s?.value), cap = Number(s?.max);
      if (!Number.isFinite(v)) return Infinity;
      if (Number.isFinite(cap) && v >= cap) return Infinity;
      return v;
    }
    function updateCriteriaBar() {
      const we=document.getElementById("criteriaWhere"),pe=document.getElementById("criteriaPickup"),de=document.getElementById("criteriaDropoff");
      if(we)we.textContent=`Where: ${searchState.where||"(any)"}`;
      if(pe)pe.textContent=`Pick Up: ${searchState.pickup||"(any)"}`;
      if(de)de.textContent=`Drop Off: ${searchState.dropoff||"(any)"}`;
    }
    function syncUrlState() {
      const next=new URLSearchParams();
      if(isPreview)next.set("preview","1");
      if(searchState.where)next.set("where",searchState.where);
      if(searchState.pickup)next.set("pickup",searchState.pickup);
      if(searchState.dropoff)next.set("dropoff",searchState.dropoff);
      const q=getSearchQuery(),type=getSelectedType(),drive=getSelectedDrive(),maxPrice=getMaxPrice();
      if(q)next.set("q",q); if(type)next.set("type",type); if(drive)next.set("drive",drive);
      if(Number.isFinite(maxPrice))next.set("maxPrice",String(maxPrice));
      window.history.replaceState({},"",`${window.location.pathname}?${next.toString()}`);
    }
    function hydrateUiFromQuery() {
      const si=document.getElementById("searchInput"),ts=document.getElementById("filterType"),ds=document.getElementById("filterDrive"),ps=document.getElementById("filterPrice");
      if(si)si.value=searchState.q; if(ts)ts.value=searchState.type; if(ds)ds.value=searchState.drive;
      if(ps&&searchState.maxPrice)ps.value=searchState.maxPrice;
      updateCriteriaBar();
    }
    function buildSubtitle(total) {
      const parts=[];
      if(searchState.where)parts.push(`in ${searchState.where}`);
      if(searchState.pickup||searchState.dropoff)parts.push(`${searchState.pickup||"any pickup"} → ${searchState.dropoff||"any drop off"}`);
      return `<span id="availableCount">${total}</span> available vehicles${parts.length?` • ${parts.join(" • ")}`:" • Updated in real-time"}`;
    }
    function updatePriceLabel() {
      const s=document.getElementById("filterPrice"),l=document.getElementById("priceLabel"); if(!s||!l)return;
      const max=Number(s.max),val=Number(s.value); l.textContent=(!Number.isFinite(val)||!Number.isFinite(max)||val>=max)?"Any":`$${val}`;
    }

    function buildCarsEndpoint(page) {
      const p=new URLSearchParams(), q=getSearchQuery(),type=getSelectedType(),drive=getSelectedDrive(),maxPrice=getMaxPrice();
      if(searchState.where)p.set("where",searchState.where); if(searchState.pickup)p.set("pickup",searchState.pickup); if(searchState.dropoff)p.set("dropoff",searchState.dropoff);
      if(q)p.set("q",q); if(type)p.set("type",type); if(drive)p.set("drive",drive);
      if(Number.isFinite(maxPrice))p.set("maxPrice",String(maxPrice));
      p.set("page",String(page)); p.set("pageSize",String(PAGE_SIZE));
      return `${API}/cars?${p.toString()}`;
    }

    async function fetchCarsPage(page, {append=false}={}) {
      const grid=document.getElementById("carsGrid"), subtitle=document.getElementById("carsSubtitle"), loadMoreBtn=document.getElementById("loadMoreBtn");
      let signal;
      if(!append){
        if(carsListAbort)carsListAbort.abort();
        carsListAbort=new AbortController();
        signal=carsListAbort.signal;
        grid.innerHTML=`<div style="color:var(--muted,#555);">Loading cars…</div>`;
      } else if(loadMoreBtn){loadMoreBtn.disabled=true;loadMoreBtn.textContent="Loading...";}
      try {
        const res=await fetch(buildCarsEndpoint(page),signal?{signal}:undefined), data=await res.json();
        if(!res.ok)throw new Error(data.error||"Could not load cars");
        const rawCars=Array.isArray(data?.rows)?data.rows:Array.isArray(data)?data:[];
        const nextCars=rawCars.map(normalizeCar);
        totalCars=Number(data?.total||nextCars.length); currentPage=Number(data?.page||page);
        allCars=append?[...allCars,...nextCars]:nextCars;
        if(subtitle)subtitle.innerHTML=buildSubtitle(totalCars);
        const slider=document.getElementById("filterPrice"), rmp=Number(data?.maxPrice||0);
        if(slider&&!append){
          const sm=rmp>0?rmp:2000, rounded=Math.ceil(sm/50)*50;
          const prevMax=Number(slider.max)||2000;
          slider.max=String(Math.max(prevMax, rounded));
          if(Number(slider.value||0)>Number(slider.max||0))slider.value=slider.max;
        }
        updatePriceLabel(); renderCars(allCars);
      } catch(e) {
        if(e?.name==="AbortError")return;
        console.error(e); document.getElementById("carsGrid").innerHTML=`<div style="color:var(--danger,#b91c1c);">Failed to load cars.</div>`;
      } finally { if(loadMoreBtn){loadMoreBtn.disabled=false;loadMoreBtn.textContent="Load More";} }
    }

    function applyAllFilters() { syncUrlState(); fetchCarsPage(1); }
    async function loadCars() {
      const s=document.getElementById("filterPrice");
      if(s&&!(searchState.maxPrice&&String(searchState.maxPrice).trim())){s.value=s.max;updatePriceLabel();}
      await fetchCarsPage(1);
    }

    function wireUI() {
      document.getElementById("searchInput")?.addEventListener("input",  applyAllFilters);
      document.getElementById("filterType")?.addEventListener("change",  applyAllFilters);
      document.getElementById("filterDrive")?.addEventListener("change", applyAllFilters);
      document.getElementById("filterPrice")?.addEventListener("input",  ()=>{updatePriceLabel();applyAllFilters();});
      document.getElementById("loadMoreBtn")?.addEventListener("click",  ()=>fetchCarsPage(currentPage+1,{append:true}));
      const fb=document.getElementById("filterBtn"), fp=document.getElementById("filterPanel");
      fb?.addEventListener("click",()=>{if(!fp)return;fp.style.display=fp.style.display==="none"||!fp.style.display?"block":"none";});
      document.getElementById("clearFilters")?.addEventListener("click",()=>{
        const s=document.getElementById("searchInput"),t=document.getElementById("filterType"),d=document.getElementById("filterDrive"),p=document.getElementById("filterPrice");
        if(s)s.value="";if(t)t.value="";if(d)d.value="";if(p)p.value=p.max;
        updatePriceLabel();applyAllFilters();
      });
      updatePriceLabel(); hydrateUiFromQuery();
    }

    wireUI();
    loadCars();
  </script>

  <script src="chat.js"></script>
  <script src="navbar.js"></script>
  <script src="darkm.js"></script>
</body>
</html>
