<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cars</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet" />
    <style>
      * { box-sizing: border-box; font-family: Inter, system-ui; }

      body {
        margin: 0;
        background: var(--bg, #f4f6f9);
        color: var(--ink, #0d1117);
        transition: background 0.2s, color 0.2s;
      }

      .container { max-width: 1400px; margin: auto; padding: 40px; }

      header { display: flex; justify-content: space-between; align-items: center; }

      h1 { font-size: 44px; margin: 0; color: var(--ink, #0d1117); }

      .sub { color: var(--muted, #555); font-size: 14px; }

      .topRow {
        display: flex;
        justify-content: space-between;
        margin: 30px 0 12px;
        gap: 16px;
      }

      button {
        padding: 12px 18px;
        border-radius: 14px;
        border: none;
        cursor: pointer;
        transition: filter 0.15s;
      }

      button:hover { filter: brightness(0.95); }

      .primary { background: var(--accent, #4f46e5); color: white; }

      .secondary {
        background: var(--surface, white);
        border: 1px solid var(--border, #ccc);
        color: var(--ink, #0d1117);
      }

      .searchBox {
        height: 46px;
        border-radius: 14px;
        border: 1px solid var(--border, #ddd);
        padding: 0 14px;
        width: 300px;
        background: var(--surface, white);
        color: var(--ink, #0d1117);
      }

      .searchBox::placeholder { color: var(--muted, #8891a0); }

      .grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 24px;
      }

      .card {
        background: var(--surface, white);
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 12px 30px rgba(0,0,0,0.06);
        position: relative;
        border: 1px solid var(--border, transparent);
      }

      .card img {
        width: 100%;
        height: 220px;
        object-fit: cover;
        background: var(--surface2, #ddd);
      }

      .cardBody { padding: 18px; }

      .headerRow { display: flex; justify-content: space-between; align-items: center; gap: 16px; }
      .headerLeft h3 { margin: 0; line-height: 1.2; color: var(--ink, #0d1117); }
      .headerLeft .meta { margin-top: 4px; }

      .titleRow { display: flex; justify-content: space-between; }
      .price { font-weight: 600; color: var(--ink, #0d1117); }

      .tag {
        display: inline-block;
        padding: 6px 12px;
        border-radius: 999px;
        font-size: 12px;
        margin: 8px 0;
      }

      .available   { background: #dcfce7; color: #166534; }
      .unavailable { background: var(--danger-light, #fee2e2); color: var(--danger, #991b1b); }

      .meta { color: var(--muted, #555); font-size: 14px; }

      .cardActions { display: flex; gap: 12px; margin-top: 14px; }

      .linkBtn {
        flex: 1;
        text-align: center;
        padding: 10px;
        border-radius: 12px;
        text-decoration: none;
        font-weight: 600;
      }

      .viewBtn { background: var(--accent, #4f46e5); color: white; }

      .bookBtn {
        border: 1px solid var(--border, #ccc);
        color: var(--ink, #0d1117);
        background: var(--surface, white);
      }

      /* ── FILTER PANEL ── */
      #filterPanel {
        display: none;
        margin: 10px 0 22px;
        padding: 18px;
        border-radius: 18px;
        background: var(--surface, rgba(255,255,255,0.7));
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border: 1px solid var(--border, rgba(148,163,184,0.35));
        box-shadow: 0 16px 45px rgba(15,23,42,0.1);
      }

      #filterPanel select {
        height: 44px;
        border-radius: 14px;
        border: 1px solid var(--border, rgba(148,163,184,0.45));
        background: var(--surface, rgba(255,255,255,0.95));
        color: var(--ink, #0d1117);
        padding: 0 12px;
        min-width: 190px;
        outline: none;
        transition: box-shadow 0.15s ease, border-color 0.15s ease;
      }

      #filterPanel select:focus {
        border-color: rgba(79,70,229,0.55);
        box-shadow: 0 0 0 4px rgba(79,70,229,0.15);
      }

      #filterPanel input[type="range"] {
        width: 260px;
        height: 6px;
        border-radius: 999px;
        background: var(--border, rgba(148,163,184,0.35));
        outline: none;
      }

      #filterPanel input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 18px; height: 18px;
        border-radius: 999px;
        background: var(--accent, #4f46e5);
        border: 2px solid white;
        box-shadow: 0 10px 18px rgba(79,70,229,0.25);
        cursor: pointer;
      }

      #filterPanel input[type="range"]::-moz-range-thumb {
        width: 18px; height: 18px;
        border-radius: 999px;
        background: var(--accent, #4f46e5);
        border: 2px solid white;
        cursor: pointer;
      }

      #clearFilters {
        border: 1px solid var(--border, rgba(148,163,184,0.55));
        background: var(--surface, rgba(255,255,255,0.85));
        color: var(--ink, #0d1117);
      }

      .card.clickable:hover {
        transform: translateY(-4px);
        box-shadow: 0 20px 40px rgba(79,70,229,0.15);
        transition: all 0.2s ease;
      }

      /* ── MODAL ── */
      #vehicleModal {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.5);
        z-index: 1000;
        align-items: center;
        justify-content: center;
      }

      .modalInner {
        background: var(--surface, white);
        border-radius: 20px;
        padding: 32px;
        max-width: 560px;
        width: 90%;
        max-height: 85vh;
        overflow-y: auto;
        box-shadow: 0 20px 60px rgba(0,0,0,0.25);
        position: relative;
        border: 1px solid var(--border, transparent);
      }

      .modalClose {
        position: absolute;
        top: 16px; right: 16px;
        background: none;
        border: none;
        font-size: 22px;
        cursor: pointer;
        color: var(--muted, #64748b);
        padding: 4px 8px;
      }

      #modalTitle { margin: 0 0 4px; color: var(--ink, #0d1117); }

      .modalTableRow { border-bottom: 1px solid var(--border, #f1f5f9); }
      .modalTableLabel { padding: 10px 8px; color: var(--muted, #64748b); font-weight: 600; width: 40%; }
      .modalTableValue { padding: 10px 8px; color: var(--ink, #0d1117); }

      @media (max-width: 900px) {
        .grid { grid-template-columns: 1fr; }
        .topRow { flex-direction: column; align-items: stretch; }
        .searchBox { width: 100%; }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <header style="margin-top: 20px;">
        <div>
          <h1>Cars</h1>
          <div class="sub" id="carsSubtitle">
            <span id="availableCount">—</span> available vehicles • Updated in real-time
          </div>
        </div>
      </header>

      <div class="topRow">
        <input id="searchInput" class="searchBox" placeholder="Search by make/model" />
        <button id="filterBtn" class="secondary" type="button">Filter</button>
      </div>

      <div id="filterPanel">
        <div style="display:flex;gap:16px;flex-wrap:wrap;align-items:end;">
          <div>
            <div class="sub" style="margin-bottom:6px;">Vehicle Type</div>
            <select id="filterType">
              <option value="">Any</option>
              <option value="Sedan">Sedan</option>
              <option value="SUV">SUV</option>
              <option value="Sport">Sport</option>
              <option value="Truck">Truck</option>
            </select>
          </div>
          <div>
            <div class="sub" style="margin-bottom:6px;">Drivetrain</div>
            <select id="filterDrive">
              <option value="">Any</option>
              <option value="AWD">AWD</option>
              <option value="FWD">FWD</option>
              <option value="RWD">RWD</option>
              <option value="4x4">4×4</option>
            </select>
          </div>
          <div style="min-width:260px;">
            <div class="sub" style="margin-bottom:6px;">Max price: <span id="priceLabel">Any</span></div>
            <input id="filterPrice" type="range" min="0" max="2000" step="50" value="2000" />
          </div>
          <div>
            <button id="clearFilters" class="secondary" type="button">Clear</button>
          </div>
        </div>
      </div>

      <div class="grid" id="carsGrid"></div>
    </div>

    <!-- MODAL -->
    <div id="vehicleModal">
      <div class="modalInner">
        <button class="modalClose" onclick="closeModal()">✕</button>
        <img id="modalImg" src="" alt=""
          style="width:100%;height:200px;object-fit:cover;border-radius:12px;margin-bottom:20px;"
          onerror="this.src='./assets/cars/dummy.png'" />
        <h2 id="modalTitle"></h2>
        <span id="modalTag" class="tag" style="margin-bottom:16px;display:inline-block;"></span>
        <table id="modalTable" style="width:100%;border-collapse:collapse;font-size:15px;"></table>
        <div style="display:flex;gap:12px;margin-top:24px;">
          <a id="modalViewBtn" href="#" class="linkBtn viewBtn" style="flex:1;text-align:center;padding:12px;text-decoration:none;font-weight:600;border-radius:12px;">View Details</a>
          <a id="modalBookBtn" href="#" class="linkBtn bookBtn" style="flex:1;text-align:center;padding:12px;text-decoration:none;font-weight:600;border-radius:12px;">Book</a>
        </div>
      </div>
    </div>

    <script>
      const API = window.location.hostname === "localhost"
        ? "http://localhost:10000"
        : "https://server-side-zqaz.onrender.com";

      const params    = new URLSearchParams(window.location.search);
      const isPreview = params.get("preview") === "1";

      function normalizeCity(v) { return String(v || "").trim().toLowerCase().replace(/,.*$/, ""); }

      const searchWhere = normalizeCity(params.get("where"));

      // ── IMAGE MANIFEST ──
      const IMAGE_ASSIGNMENTS_KEY = 'carImageAssignments';

      const IMAGE_MANIFEST = {
        'chevrolet/equinox':  [{num:1,ext:'jpeg'},{num:2,ext:'jpeg'},{num:3,ext:'jpeg'}],
        'chevrolet/trax':     [{num:1,ext:'jpeg'},{num:2,ext:'jpeg'},{num:3,ext:'jpeg'}],
        'dodge/challenger':   [{num:1,ext:'png' },{num:2,ext:'png' },{num:3,ext:'jpeg'}],
        'ford/maverick':      [{num:1,ext:'jpeg'},{num:2,ext:'jpeg'},{num:3,ext:'jpeg'}],
        'honda/civic':        [{num:1,ext:'jpeg'},{num:2,ext:'jpeg'},{num:3,ext:'jpeg'}],
        'hyundai/elantra':    [{num:1,ext:'jpeg'},{num:2,ext:'jpeg'},{num:3,ext:'jpeg'}],
        'hyundai/tucson':     [{num:1,ext:'jpeg'},{num:2,ext:'jpeg'},{num:3,ext:'jpeg'}],
        'hyundai/venue':      [{num:1,ext:'jpeg'},{num:2,ext:'jpeg'},{num:3,ext:'jpeg'}],
        'kia/k4':             [{num:1,ext:'jpeg'},{num:2,ext:'jpeg'},{num:3,ext:'jpeg'}],
        'kia/soul':           [{num:1,ext:'jpeg'},{num:2,ext:'jpeg'},{num:3,ext:'jpeg'}],
        'kia/sportage':       [{num:1,ext:'jpeg'},{num:2,ext:'jpeg'},{num:3,ext:'jpeg'}],
        'mazda/mx-5 miata':   [{num:1,ext:'jpeg'},{num:2,ext:'jpeg'},{num:3,ext:'jpeg'}],
        'nissan/kicks':       [{num:1,ext:'png' },{num:2,ext:'jpeg'},{num:3,ext:'jpeg'}],
        'nissan/sentra':      [{num:1,ext:'jpeg'},{num:2,ext:'jpeg'},{num:3,ext:'jpeg'}],
        'porsche/911':        [{num:1,ext:'jpeg'},{num:2,ext:'jpeg'},{num:3,ext:'jpeg'}],
        'rivian/r1s':         [{num:1,ext:'jpeg'}],
        'subaru/brz':         [{num:1,ext:'jpeg'},{num:2,ext:'jpeg'},{num:3,ext:'jpeg'}],
        'toyota/corolla':     [{num:1,ext:'png' },{num:2,ext:'png' },{num:3,ext:'jpeg'}],
        'toyota/gr86':        [{num:1,ext:'jpeg'},{num:2,ext:'jpeg'},{num:3,ext:'jpeg'}],
        'toyota/highlander':  [{num:1,ext:'png' },{num:2,ext:'png' },{num:3,ext:'jpeg'}],
        'volkswagen/jetta':   [{num:1,ext:'jpeg'},{num:2,ext:'jpeg'},{num:3,ext:'jpeg'}],
        'rivian/r1t':         [{ num: 2, ext: 'jpeg' }],
        'bmw/i4':             [{ num: 1, ext: 'jpeg' }],
        'bmw/x5':             [{ num: 1, ext: 'jpeg' }],
        'subaru/crosstrek':   [{ num: 1, ext: 'jpeg' }],
        'subaru/forester':    [{ num: 1, ext: 'jpeg' }],
        'ford/mustang':           [{ num: 1, ext: 'jpeg' }],
        'ford/mustang mach-e':    [{ num: 1, ext: 'jpeg' }],
        'ford/f-150 lightning':   [{ num: 1, ext: 'jpeg' }],
        'genesis/gv70':           [{ num: 1, ext: 'jpeg' }],
        'lexus/rx 350 hybrid':    [{ num: 1, ext: 'jpeg' }],
        'lexus/es':               [{ num: 1, ext: 'jpeg' }],
      };

      function loadImageAssignments() {
        const raw = localStorage.getItem(IMAGE_ASSIGNMENTS_KEY);
        return raw ? JSON.parse(raw) : {};
      }

      function saveImageAssignments(a) {
        localStorage.setItem(IMAGE_ASSIGNMENTS_KEY, JSON.stringify(a));
      }

      function getOrCreateImageAssignment(vehicleId, manufacturer, model) {
        if (!vehicleId || !manufacturer || !model) return './assets/cars/dummy.png';
        const modelKey = `${manufacturer.toLowerCase().trim()}/${model.toLowerCase().trim()}`;
        const assignments = loadImageAssignments();

        if (assignments[vehicleId]) return assignments[vehicleId];

        const available = IMAGE_MANIFEST[modelKey] || [];

        // Not in manifest → use Unsplash (free, no API key)
        if (available.length === 0) {
          const query = encodeURIComponent(`${manufacturer} ${model} car`);
          return `https://source.unsplash.com/seed/${encodeURIComponent(vehicleId)}/600x400/?${query}`;
        }

        // In manifest → pick from local assets
        const usedUrls = new Set(
          Object.entries(assignments)
            .filter(([vid]) => vid !== vehicleId)
            .map(([, url]) => url)
            .filter(url => url.includes(`/assets/cars/${modelKey}/`))
        );
        const pool = available.filter(i => !usedUrls.has(`./assets/cars/${modelKey}/${i.num}.${i.ext}`));
        const chosen = (pool.length ? pool : available)[Math.floor(Math.random() * (pool.length || available.length))];
        const url = `./assets/cars/${modelKey}/${chosen.num}.${chosen.ext}`;
        assignments[vehicleId] = url;
        saveImageAssignments(assignments);
        return url;
      }

      // ── POPULARITY ──
      function getWeekKey(date = new Date()) {
        const d = new Date(date); d.setHours(0,0,0,0);
        const day = d.getDay(); const diffToMonday = day === 0 ? -6 : 1 - day;
        d.setDate(d.getDate() + diffToMonday);
        return d.toISOString().slice(0,10);
      }
      function popularityStorageKey() { return `popularity:${getWeekKey()}`; }
      function loadPopularityMap() { const raw = localStorage.getItem(popularityStorageKey()); const obj = raw ? JSON.parse(raw) : {}; return obj && typeof obj === "object" ? obj : {}; }
      function savePopularityMap(map) { localStorage.setItem(popularityStorageKey(), JSON.stringify(map)); }
      function bumpPopularity(vehicleId, amount) { if (!vehicleId) return; const map = loadPopularityMap(); map[String(vehicleId)] = Number(map[String(vehicleId)] || 0) + Number(amount || 0); savePopularityMap(map); }

      // ── SESSION ──
      const SESSION_MS = 12 * 60 * 60 * 1000;
      function requireSession() {
        const email = localStorage.getItem("userEmail");
        const loggedInAt = Number(localStorage.getItem("loggedInAt") || "0");
        if (!email || !loggedInAt) { window.location.replace("index.html"); throw new Error("No session"); }
        if (Date.now() - loggedInAt > SESSION_MS) {
          ["userEmail","loggedInAt","isAdmin"].forEach(k => localStorage.removeItem(k));
          window.location.replace("index.html"); throw new Error("Session expired");
        }
        return email;
      }
      const userEmail = isPreview ? localStorage.getItem("userEmail") || "preview@example.com" : requireSession();

      // ── FAVOURITES ──
      function favStorageKey() { return `favs:${userEmail}`; }
      function loadFavsSet() { const raw = localStorage.getItem(favStorageKey()); const arr = raw ? JSON.parse(raw) : []; return new Set(Array.isArray(arr) ? arr : []); }
      function saveFavsSet(set) { localStorage.setItem(favStorageKey(), JSON.stringify([...set])); }
      function carKeyFromParts(manufacturer, model, drivetrain, priceNum) { const p = Number.isFinite(priceNum) ? priceNum.toFixed(2) : "NA"; return `${manufacturer}|${model}|${drivetrain}|${p}`; }

      let allCars = [], filteredCars = [];

      function safeStr(v) { return (v ?? "").toString().trim(); }

      function normalizeCar(car) {
        const id           = safeStr(car["Vehicle ID"] ?? car.vehicleId ?? car.id);
        const manufacturer = safeStr(car["Manufacturer"]);
        const model        = safeStr(car["Model"]);
        const type         = safeStr(car["Vehicle Type"]);
        const drivetrain   = safeStr(car["Drivetrain"]);
        const city         = safeStr(car["City"] ?? car.city ?? car["Available City"] ?? car.availableCity);
        const priceRaw     = car["Price"];
        const priceNum     = Number(priceRaw);
        const isAvailable  = Number(car["Availability"]) === 1;
        const cleanPriceNum = Number.isFinite(priceNum) ? priceNum : null;
        const priceText    = Number.isFinite(priceNum) ? `$${priceNum.toFixed(2)}/day` : `$${priceRaw}/day`;
        const imgUrl       = getOrCreateImageAssignment(id, manufacturer, model);
        const favKey       = carKeyFromParts(manufacturer, model, drivetrain, cleanPriceNum ?? NaN);
        return { id, manufacturer, model, type, drivetrain, city, isAvailable, priceText, imgUrl, priceNum: cleanPriceNum, favKey };
      }

      function carDetailsHref(vehicleId) { if (!vehicleId) return "#"; return `car-details.html?id=${encodeURIComponent(vehicleId)}${isPreview ? "&preview=1" : ""}`; }
      function carBookHref(vehicleId)    { return carDetailsHref(vehicleId); }

      // ── MODAL ──
      function openModal(car) {
        const name = `${car.manufacturer} ${car.model}`.trim();
        document.getElementById("modalImg").src = car.imgUrl;
        document.getElementById("modalImg").alt = name;
        document.getElementById("modalTitle").textContent = name;
        const tag = document.getElementById("modalTag");
        tag.textContent = car.isAvailable ? "Available" : "Unavailable";
        tag.className = `tag ${car.isAvailable ? "available" : "unavailable"}`;
        const rows = [
          ["Manufacturer", car.manufacturer], ["Model", car.model],
          ["City", car.city || "—"],          ["Type", car.type],
          ["Drivetrain", car.drivetrain],      ["Price", car.priceText],
          ["Vehicle ID", car.id || "—"],
        ];
        document.getElementById("modalTable").innerHTML = rows.map(([label, val]) => `
          <tr class="modalTableRow">
            <td class="modalTableLabel">${label}</td>
            <td class="modalTableValue">${val || "—"}</td>
          </tr>`).join("");
        document.getElementById("modalViewBtn").href = carDetailsHref(car.id);
        document.getElementById("modalBookBtn").href = carBookHref(car.id);
        document.getElementById("modalViewBtn").setAttribute("data-vehicle-id", car.id || "");
        document.getElementById("modalBookBtn").setAttribute("data-vehicle-id", car.id || "");
        document.getElementById("vehicleModal").style.display = "flex";
      }

      function closeModal() { document.getElementById("vehicleModal").style.display = "none"; }

      document.getElementById("vehicleModal").addEventListener("click", function(e) { if (e.target === this) closeModal(); });
      document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });

      document.getElementById("modalViewBtn").addEventListener("click", function(e) {
        const vehicleId = this.getAttribute("data-vehicle-id") || "";
        if (!vehicleId) return; e.preventDefault(); bumpPopularity(vehicleId, 2); window.location.assign(carDetailsHref(vehicleId));
      });
      document.getElementById("modalBookBtn").addEventListener("click", function(e) {
        const vehicleId = this.getAttribute("data-vehicle-id") || "";
        if (!vehicleId) return; e.preventDefault(); bumpPopularity(vehicleId, 4); window.location.assign(carBookHref(vehicleId));
      });

      // ── RENDER ──
      function renderCars(cars) {
        const grid = document.getElementById("carsGrid");
        grid.innerHTML = "";
        if (!cars.length) { grid.innerHTML = `<div style="color:var(--muted,#555);">No cars match your search/filters.</div>`; return; }

        cars.forEach(car => {
          const tagClass = car.isAvailable ? "available" : "unavailable";
          const tagText  = car.isAvailable ? "Available" : "Unavailable";
          const name     = `${car.manufacturer} ${car.model}`.trim();
          const metaBits = [car.city, car.type, car.drivetrain].filter(Boolean);
          const favsSet  = loadFavsSet();
          const isFav    = favsSet.has(car.favKey);

          const card = document.createElement("div");
          card.className = "card";
          if (car.isAvailable) {
            card.classList.add("clickable");
            card.style.cursor = "pointer";
            card.addEventListener("click", e => { if (e.target.closest("a, button")) return; openModal(car); });
          }

          card.innerHTML = `
            <div class="favBtn" data-fav-key="${car.favKey}"
              style="position:absolute;top:12px;right:12px;background:rgba(255,255,255,0.9);border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:20px;box-shadow:0 4px 10px rgba(0,0,0,0.1);z-index:10;transition:transform 0.2s;user-select:none;">
              ${isFav ? "❤️" : "🤍"}
            </div>
            <img src="${car.imgUrl}" alt="${name}" onerror="this.src='./assets/cars/dummy.png'">
            <div class="cardBody">
              <div class="headerRow">
                <div class="headerLeft">
                  <h3>${name}</h3>
                  <div class="meta">${metaBits.join(" • ") || "—"}</div>
                </div>
              </div>
              <div class="price" style="margin-top:8px;">${car.priceText}</div>
              <span class="tag ${tagClass}" style="margin-top:10px;display:inline-block;">${tagText}</span>
              <div class="cardActions">
                <a class="linkBtn viewBtn" href="${carDetailsHref(car.id)}" data-vehicle-id="${car.id || ""}">View</a>
                <a class="linkBtn bookBtn" href="${carBookHref(car.id)}"    data-vehicle-id="${car.id || ""}">Book</a>
              </div>
            </div>`;

          grid.appendChild(card);
        });

        // Fav buttons
        grid.querySelectorAll(".favBtn").forEach(btn => {
          btn.addEventListener("click", e => {
            e.preventDefault(); e.stopPropagation();
            const key = btn.getAttribute("data-fav-key"); if (!key) return;
            const favs = loadFavsSet();
            if (favs.has(key)) { favs.delete(key); btn.innerHTML = "🤍"; }
            else { favs.add(key); btn.innerHTML = "❤️"; btn.style.transform = "scale(1.2)"; setTimeout(() => btn.style.transform = "scale(1)", 200); }
            saveFavsSet(favs);
          });
        });

        // View / Book links
        grid.querySelectorAll(".viewBtn").forEach(link => {
          link.addEventListener("click", e => { const vid = link.getAttribute("data-vehicle-id") || ""; if (!vid) return; e.preventDefault(); e.stopPropagation(); bumpPopularity(vid, 2); window.location.assign(carDetailsHref(vid)); });
        });
        grid.querySelectorAll(".bookBtn").forEach(link => {
          link.addEventListener("click", e => { const vid = link.getAttribute("data-vehicle-id") || ""; if (!vid) return; e.preventDefault(); e.stopPropagation(); bumpPopularity(vid, 4); window.location.assign(carBookHref(vid)); });
        });
      }

      // ── FILTERS ──
      function getSearchQuery()  { return (document.getElementById("searchInput")?.value  || "").trim().toLowerCase(); }
      function getSelectedType() { return (document.getElementById("filterType")?.value   || "").trim(); }
      function getSelectedDrive(){ return (document.getElementById("filterDrive")?.value  || "").trim(); }
      function getMaxPrice()     { const v = Number(document.getElementById("filterPrice")?.value); return Number.isFinite(v) ? v : Infinity; }

      function updatePriceLabel() {
        const slider = document.getElementById("filterPrice");
        const label  = document.getElementById("priceLabel");
        if (!slider || !label) return;
        const max = Number(slider.max), val = Number(slider.value);
        label.textContent = (!Number.isFinite(val) || !Number.isFinite(max) || val >= max) ? "Any" : `$${val}`;
      }

      function applyAllFilters() {
        const q          = getSearchQuery();
        const typeFilter = getSelectedType().toLowerCase();
        const driveFilter= getSelectedDrive().toLowerCase();
        const maxPrice   = getMaxPrice();
        filteredCars = allCars.filter(c => {
          if (q) { const title = `${c.manufacturer} ${c.model}`.toLowerCase(); const city = normalizeCity(c.city); if (!(title.includes(q) || city.includes(normalizeCity(q)) || (c.type||"").toLowerCase().includes(q) || (c.drivetrain||"").toLowerCase().includes(q))) return false; }
          if (searchWhere && !normalizeCity(c.city).includes(searchWhere)) return false;
          if (typeFilter  && (c.type      ||"").toLowerCase() !== typeFilter)  return false;
          if (driveFilter && (c.drivetrain||"").toLowerCase() !== driveFilter) return false;
          if (Number.isFinite(c.priceNum) && c.priceNum > maxPrice) return false;
          return true;
        });
        renderCars(filteredCars);
      }

      // ── LOAD ──
      async function loadCars() {
        const grid     = document.getElementById("carsGrid");
        const subtitle = document.getElementById("carsSubtitle");
        grid.innerHTML = `<div style="color:var(--muted,#555);">Loading cars…</div>`;
        try {
          const endpoint = searchWhere ? `${API}/cars?where=${encodeURIComponent(params.get("where"))}` : `${API}/cars`;
          const res  = await fetch(endpoint);
          const data = await res.json();
          const rawCars = Array.isArray(data) ? data : (data.cars ?? data.vehicles ?? []);
          allCars = rawCars.map(normalizeCar);
          if (subtitle) {
            subtitle.innerHTML = searchWhere
              ? `<span id="availableCount">${allCars.length}</span> cars in ${params.get("where")}`
              : `<span id="availableCount">${allCars.length}</span> available vehicles • Updated in real-time`;
          }
          const prices   = allCars.map(c => c.priceNum).filter(n => Number.isFinite(n));
          const maxPrice = prices.length ? Math.max(...prices) : 2000;
          const slider   = document.getElementById("filterPrice");
          if (slider) { slider.max = String(Math.ceil(maxPrice / 50) * 50); slider.value = slider.max; updatePriceLabel(); }
          applyAllFilters();
        } catch(e) {
          console.error(e);
          document.getElementById("carsGrid").innerHTML = `<div style="color:var(--danger,#b91c1c);">Failed to load cars.</div>`;
        }
      }

      // ── WIRE UI ──
      function wireUI() {
        document.getElementById("searchInput")?.addEventListener("input", applyAllFilters);
        const btn = document.getElementById("filterBtn"), panel = document.getElementById("filterPanel");
        btn?.addEventListener("click", () => { if (!panel) return; panel.style.display = panel.style.display === "none" || !panel.style.display ? "block" : "none"; });
        document.getElementById("filterType") ?.addEventListener("change", applyAllFilters);
        document.getElementById("filterDrive")?.addEventListener("change", applyAllFilters);
        document.getElementById("filterPrice")?.addEventListener("input",  () => { updatePriceLabel(); applyAllFilters(); });
        document.getElementById("clearFilters")?.addEventListener("click", () => {
          const s = document.getElementById("searchInput"), t = document.getElementById("filterType"), d = document.getElementById("filterDrive"), p = document.getElementById("filterPrice");
          if (s) s.value = ""; if (t) t.value = ""; if (d) d.value = ""; if (p) p.value = p.max;
          updatePriceLabel(); applyAllFilters();
        });
        updatePriceLabel();
      }

      wireUI();
      loadCars();
    </script>
    <script src="navbar.js"></script>
<script src="darkm.js"></script>
  </body>
</html>
