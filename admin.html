<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>

  <style>
    * { box-sizing: border-box; font-family: Inter, system-ui; }

    body {
      margin: 0;
      background: var(--bg, #f4f6f9);
      color: var(--ink, #0f172a);
      min-height: 100vh;
      transition: background 0.2s, color 0.2s;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px;
    }
    /* Top bar */
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
    }
    .topbar h1 {
      font-size: 36px;
      font-weight: 700;
      margin: 0;
      color: var(--ink, #0f172a);
    }
    .topbar .sub {
      font-size: 14px;
      color: var(--muted, #64748b);
      margin-top: 4px;
    }
    /* Buttons */
    button {
      padding: 10px 18px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: filter 0.15s;
    }

    button:hover { filter: brightness(0.95); }
    button:disabled { opacity: 0.4; cursor: not-allowed; filter: none; }
    #logoutBtn { background: var(--surface, white); border: 1px solid var(--border, #e2e8f0); color: var(--ink, #0f172a); }
    .dm-toggle { background: var(--surface, white); border: 1px solid var(--border, #e2e8f0); color: var(--ink, #0f172a); }
    .btnPrimary { background: var(--accent, #4f46e5); color: white; }
    .btnSuccess { background: #22c55e; color: white; }
    .btnExport  { background: #f59e0b; color: white; }

    /* Status */
    #status {
      font-size: 14px;
      color: var(--muted, #64748b);
      margin-bottom: 20px;
    }
    /* Table nav pills */
    #tableLinks {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }
    #tableLinks a {
      display: inline-block;
      padding: 8px 18px;
      border-radius: 999px;
      background: var(--surface, white);
      border: 1px solid var(--border, #e2e8f0);
      color: var(--accent, #4f46e5);
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      transition: all 0.15s;
    }
    #tableLinks a:hover {
      background: var(--accent, #4f46e5);
      color: white;
      border-color: var(--accent, #4f46e5);
    }
    /* Panel */
    .panel {
      background: var(--surface, white);
      border-radius: 20px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.06);
      overflow: hidden;
      border: 1px solid var(--border, transparent);
    }

    .panelHeader {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 24px;
      border-bottom: 1px solid var(--border, #f1f5f9);
    }
    .panelHeader h2 {
      font-size: 18px;
      font-weight: 700;
      margin: 0;
      color: var(--ink, #0f172a);
    }
    .controls {
      display: flex;
      gap: 10px;
    }
    /* Table */
    #tableContainer {
      overflow-x: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th {
      padding: 12px 16px;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted, #64748b);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      background: var(--surface2, #f8fafc);
      border-bottom: 1px solid var(--border, #e2e8f0);
      text-align: left;
      white-space: nowrap;
    }

    td {
      padding: 12px 16px;
      font-size: 14px;
      border-bottom: 1px solid var(--border, #f1f5f9);
      color: var(--ink, #0f172a);
      vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--surface2, #fafbff); }

    input {
      width: 100%;
      padding: 7px 10px;
      border-radius: 8px;
      border: 1px solid var(--border, #e2e8f0);
      font-size: 13px;
      outline: none;
      background: var(--surface, white);
      color: var(--ink, #0f172a);
    }

    input:focus {
      border-color: #a5b4fc;
      box-shadow: 0 0 0 3px rgba(79,70,229,0.1);
    }

    input:disabled {
      background: var(--surface2, #f8fafc);
      color: var(--muted, #94a3b8);
    }

    input[type="date"]::-webkit-calendar-picker-indicator {
      filter: none;
      opacity: 1;
      cursor: pointer;
    }

    [data-theme="dark"] input[type="date"]::-webkit-calendar-picker-indicator {
      filter: brightness(0) invert(1);
    }

    /* Action links */
    a[data-action] {
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
    }

    a[data-action="edit"]         { color: var(--accent, #4f46e5); }
    a[data-action="delete"]       { color: var(--danger, #ef4444); }
    a[data-action="cancelEdit"],
    a[data-action="cancelCreate"] { color: var(--muted, #64748b); }
    .muted {
      padding: 24px;
      color: var(--muted, #94a3b8);
      font-size: 14px;
    }
    .promoLabel {
      font-size: 14px;
      font-weight: 600;
      color: var(--ink, #0f172a);
      display: block;
      margin-bottom: 8px;
    }
    .promoHint {
      font-size: 13px;
      color: var(--muted, #64748b);
      margin-top: 8px;
    }
  </style>

</head>

<body>
  <div class="container">

    <div class="topbar" style="margin-top: 20px;">
      <div>
        <h1>Admin Dashboard</h1>
        <div class="sub">Manage users, vehicles and sales</div>
      </div>
    </div>

    <div id="status">Loading…</div>

    <div id="tableLinks"></div>

    <!-- Promotions Management -->
    <div id="promoArea" class="panel" style="margin-bottom: 24px;">
      <div class="panelHeader">
        <h2>Promotions Banner</h2>
        <div class="controls">
          <button id="savePromoBtn" class="btnSuccess">Save Banner</button>
        </div>
      </div>
      <div style="padding: 24px;">
        <label class="promoLabel" for="promoInput">Banner Text</label>
        <input type="text" id="promoInput" placeholder="Enter promotional text (e.g., Get 20% off your first rental!)" value="">
        <p class="promoHint">Leave blank to disable the banner on the homepage.</p>
      </div>
    </div>

    <div id="adminArea" class="panel">
      <div class="panelHeader">
        <h2 id="tableTitle">Select a table above.</h2>
        <div class="controls">
          <button id="exportBtn" class="btnExport" disabled>⬇ Export PDF</button>
          <button id="createBtn" class="btnPrimary" disabled>+ Create</button>
          <button id="saveBtn" class="btnSuccess" disabled>Save</button>
        </div>
      </div>

      <div id="tableContainer">
        <div class="muted">Click a table link above to view its entries.</div>
      </div>
    </div>

  </div>

  <script src="admin.js"></script>
  <script src="navbar.js"></script>
<script src="darkm.js"></script>
</body>
</html>
