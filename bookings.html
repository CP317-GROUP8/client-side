<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bookings</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial; }

    body {
      margin: 0;
      background: linear-gradient(180deg, #eef2ff, #f8fafc);
      color: #0f172a;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 28px;
    }

    .titleWrap h1 { margin: 0; font-size: 32px; line-height: 1.15; }
    .sub { margin: 8px 0 0; color: #475569; font-size: 13px; font-weight: 600; }

    .btn {
      border: none;
      cursor: pointer;
      padding: 12px 16px;
      border-radius: 14px;
      font-weight: 700;
      transition: transform .05s ease;
      white-space: nowrap;
    }
    .btn:active { transform: translateY(1px); }
    .btn.secondary { background: white; border: 1px solid #cbd5e1; color: #0f172a; }
    .btn.primary { background: #4f46e5; color: white; font-size: 15px; padding: 14px 28px; width: 100%; }
    .btn.primary:hover { background: #4338ca; }
    .btn.primary:disabled { opacity: 0.6; cursor: not-allowed; }

    /* ── Booking form layout ── */
    #bookLayout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 28px;
      align-items: start;
    }

    .carImageCard {
      background: white;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(0,0,0,.08);
    }

    .carImageCard img {
      width: 100%;
      height: 260px;
      object-fit: cover;
      display: block;
    }

    .carImageInfo {
      padding: 20px 24px;
    }

    .carImageInfo h2 {
      margin: 0 0 4px;
      font-size: 22px;
    }

    .carImageInfo .carPrice {
      font-size: 20px;
      font-weight: 700;
      color: #4f46e5;
      margin-bottom: 12px;
    }

    .carPills {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .carPill {
      padding: 5px 12px;
      border-radius: 999px;
      font-size: 12px;
      border: 1px solid #e2e8f0;
      background: #f8fafc;
      color: #334155;
    }

    #bookForm {
      background: white;
      border-radius: 24px;
      padding: 32px;
      box-shadow: 0 20px 50px rgba(0,0,0,.08);
    }

    #bookForm h2 { margin: 0 0 24px; font-size: 22px; }

    .formGroup { margin-bottom: 18px; }
    .formGroup label { display: block; font-weight: 600; font-size: 14px; margin-bottom: 8px; color: #374151; }

    .formGroup input {
      width: 100%;
      height: 48px;
      border-radius: 14px;
      border: 1px solid #ddd;
      padding: 0 16px;
      font-size: 15px;
      outline: none;
      transition: border-color .15s;
    }
    .formGroup input:focus { border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79,70,229,0.12); }

    .dateRow { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

    #bookMsg {
      margin-top: 14px;
      font-size: 14px;
      font-weight: 600;
      min-height: 20px;
    }
    #bookMsg.error { color: #b91c1c; }
    #bookMsg.success { color: #166534; }

    /* ── History styles ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      margin-top: 12px;
    }

    .bookingCard {
      background: white;
      border-radius: 18px;
      padding: 16px;
      box-shadow: 0 12px 30px rgba(0,0,0,.06);
      border: 1px solid #e2e8f0;
    }

    .row { display: flex; gap: 16px; align-items: center; }

    .thumb {
      width: 120px;
      height: 80px;
      object-fit: cover;
      border-radius: 12px;
      background: #e2e8f0;
      flex-shrink: 0;
    }

    .bookingTitle { display: flex; justify-content: space-between; gap: 10px; align-items: baseline; margin-bottom: 10px; }
    .bookingTitle b { font-size: 16px; }

    .pillRow { display: flex; flex-wrap: wrap; gap: 8px; margin: 10px 0; }

    .pill {
      display: inline-flex;
      align-items: center;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      border: 1px solid #e2e8f0;
      background: #f8fafc;
      color: #334155;
    }

    .meta { color: #334155; font-size: 13px; line-height: 1.4; }
    .muted { color: #64748b; font-size: 12px; margin-top: 8px; }

    @media (max-width: 900px) {
      #bookLayout { grid-template-columns: 1fr; }
      .grid { grid-template-columns: 1fr; }
      .topbar { flex-direction: column; }
      .dateRow { grid-template-columns: 1fr; }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="topbar">
      <button class="btn secondary" id="backBtn">← Back</button>
      <div class="titleWrap">
        <h1 id="pageTitle">Bookings</h1>
        <p class="sub" id="status"></p>
      </div>
    </div>

    <!-- Booking form mode (?id= present) -->
    <div id="bookLayout" style="display:none;">
      <!-- Left: car image + info -->
      <div class="carImageCard">
        <img id="carImg" src="" alt="Car" onerror="this.src='./assets/cars/civic.png'">
        <div class="carImageInfo">
          <h2 id="carImgName"></h2>
          <div class="carPrice" id="carImgPrice"></div>
          <div class="carPills" id="carImgPills"></div>
        </div>
      </div>

      <!-- Right: booking form -->
      <div id="bookForm">
        <h2>Book this car</h2>

        <div class="formGroup" style="background: #f0f9ff; border: 2px solid #3b82f6; border-radius: 14px; padding: 16px; margin-bottom: 20px;">
          <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 12px;">
            <span style="font-size: 18px;">📅</span>
            <label style="font-size: 15px; font-weight: 700; color: #1e40af; margin: 0;">Select Your Dates *</label>
          </div>
          <div class="dateRow">
            <div class="formGroup" style="margin-bottom: 0;">
              <label style="color: #1e40af;">Pickup Date *</label>
              <input type="date" id="fromDate" required style="border: 2px solid #3b82f6;" />
            </div>
            <div class="formGroup" style="margin-bottom: 0;">
              <label style="color: #1e40af;">Dropoff Date *</label>
              <input type="date" id="toDate" required style="border: 2px solid #3b82f6;" />
            </div>
          </div>
          <div style="font-size: 12px; color: #1e40af; margin-top: 8px; font-weight: 500;">
            ✓ Same-day rentals are allowed
          </div>
        </div>
        
        <!-- ✅ LOCATIONS SECTION - Prominent yellow box -->
        <div class="formGroup" style="background: #fef3c7; border: 2px solid #f59e0b; border-radius: 14px; padding: 16px; margin-bottom: 20px;">
          <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 12px;">
            <span style="font-size: 18px;">📍</span>
            <label style="font-size: 15px; font-weight: 700; color: #92400e; margin: 0;">Pickup & Dropoff Locations *</label>
          </div>
          <div class="formGroup" style="margin-bottom: 12px;">
            <label style="color: #92400e;">Pickup Location *</label>
            <input type="text" id="pickupLocation" required placeholder="e.g. Downtown Toronto" style="border: 2px solid #f59e0b;" />
          </div>
          <div class="formGroup" style="margin-bottom: 0;">
            <label style="color: #92400e;">Dropoff Location *</label>
            <input type="text" id="dropoffLocation" required placeholder="e.g. Toronto Pearson Airport" style="border: 2px solid #f59e0b;" />
          </div>
        </div>
        
        <button class="btn primary" id="bookNowBtn">Book Now</button>
        <div id="bookMsg"></div>
      </div>
    </div>

    <!-- History mode (no ?id=) -->
    <div id="list" class="grid" style="display:none;"></div>
  </div>

  <script src="bookings.js"></script>
</body>
</html>
