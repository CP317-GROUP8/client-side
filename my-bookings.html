<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Bookings</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

  <style>
    * { box-sizing: border-box; font-family: Inter, system-ui; }

    body {
      margin: 0;
      background: var(--bg, #f4f6f9);
      min-height: 100vh;
      color: var(--ink, #0f172a);
      transition: background 0.2s, color 0.2s;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
    }

    .topbar h1 { font-size: 36px; font-weight: 700; margin: 0; color: var(--ink, #0f172a); }
    .topbar .sub { font-size: 14px; color: var(--muted, #64748b); margin-top: 4px; }

    .btn {
      border: 1px solid var(--border, #e2e8f0);
      cursor: pointer;
      border-radius: 12px;
      padding: 11px 16px;
      font-weight: 600;
      font-size: 14px;
      background: var(--surface, white);
      color: var(--ink, #0f172a);
      transition: filter 0.15s;
    }
    .btn:hover { filter: brightness(0.96); }

    .bookingCard {
      background: var(--surface, white);
      border-radius: 20px;
      box-shadow: 0 12px 30px rgba(0,0,0,.06);
      overflow: hidden;
      margin-bottom: 20px;
      display: grid;
      grid-template-columns: 240px 1fr;
      border: 1px solid var(--border, transparent);
    }

    .bookingCard img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: var(--surface2, #e2e8f0);
      min-height: 160px;
    }

    .bookingBody {
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .bookingTop {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }

    .bookingTop h2 { font-size: 20px; font-weight: 700; margin: 0; color: var(--ink, #0f172a); }
    .saleId { font-size: 12px; color: var(--muted, #94a3b8); margin-top: 4px; }
    .price { font-size: 20px; font-weight: 700; color: var(--accent, #4f46e5); white-space: nowrap; }

    .pillRow { display: flex; flex-wrap: wrap; gap: 8px; margin: 12px 0; }

    .pill {
      padding: 5px 12px;
      border-radius: 999px;
      font-size: 12px;
      border: 1px solid var(--border, #e2e8f0);
      background: var(--surface2, #f8fafc);
      color: var(--ink2, #334155);
    }

    .pill-ref {
      padding: 5px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      border: 1px solid var(--accent-light, #c7d2fe);
      background: var(--accent-light, #eef2ff);
      color: var(--accent, #4f46e5);
      font-family: 'Courier New', monospace;
      letter-spacing: 0.04em;
    }

    .bottomRow {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 16px;
      flex-wrap: wrap;
    }

    .dates { display: flex; gap: 12px; }

    .dateBox {
      background: var(--surface2, #f8fafc);
      border: 1px solid var(--border, #e2e8f0);
      border-radius: 12px;
      padding: 10px 16px;
    }

    .dateBox .label {
      font-size: 11px;
      color: var(--muted, #94a3b8);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .dateBox .value { font-size: 14px; font-weight: 600; margin-top: 2px; color: var(--ink, #0f172a); }

    .actionBtns {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .cancelBtn {
      border: 1px solid var(--danger, #ef4444);
      cursor: pointer;
      border-radius: 12px;
      padding: 10px 18px;
      font-weight: 600;
      font-size: 13px;
      background: var(--danger-light, #fee2e2);
      color: var(--danger, #991b1b);
      transition: filter 0.15s;
      white-space: nowrap;
    }
    .cancelBtn:hover { filter: brightness(0.95); }
    .cancelBtn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ✅ Print button */
    .printBtn {
      border: 1px solid #c7d2fe;
      cursor: pointer;
      border-radius: 12px;
      padding: 10px 18px;
      font-weight: 600;
      font-size: 13px;
      background: #eef2ff;
      color: #4f46e5;
      transition: filter 0.15s;
      white-space: nowrap;
    }
    .printBtn:hover { filter: brightness(0.95); }

    .reviewBtn {
      border: none;
      cursor: pointer;
      border-radius: 12px;
      padding: 11px 16px;
      font-weight: 700;
      font-size: 14px;
      background: var(--surface2, #eef2ff);
      color: var(--accent, #4f46e5);
      transition: filter 0.15s;
    }
    .reviewBtn:hover { filter: brightness(0.95); }
    .reviewBtn:disabled { opacity: 0.5; cursor: not-allowed; }

    .reviewPanel {
      margin-top: 16px;
      border-top: 1px solid var(--border, #e2e8f0);
      padding-top: 16px;
      display: none;
    }

    .reviewPanel.open { display: block; }

    .reviewPanel .summary {
      font-size: 13px;
      color: var(--muted, #64748b);
      margin-bottom: 10px;
    }

    .reviewPanel select,
    .reviewPanel textarea {
      width: 100%;
      border-radius: 12px;
      border: 1px solid var(--border, #dbe3ef);
      background: var(--surface2, #f8fafc);
      color: var(--ink, #0f172a);
      padding: 10px 12px;
      font-size: 14px;
      margin-bottom: 10px;
    }

    .reviewPanel textarea {
      min-height: 90px;
      resize: vertical;
    }

    .reviewPanel .rowActions {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .reviewSubmitBtn {
      border: none;
      cursor: pointer;
      border-radius: 12px;
      padding: 10px 14px;
      font-weight: 700;
      font-size: 14px;
      background: var(--accent, #4f46e5);
      color: white;
    }

    .reviewStatus {
      font-size: 12px;
      color: var(--muted, #64748b);
    }

    .stateBox {
      background: var(--surface, white);
      border-radius: 20px;
      box-shadow: 0 12px 30px rgba(0,0,0,.06);
      padding: 60px 40px;
      text-align: center;
      color: var(--muted, #64748b);
      border: 1px solid var(--border, transparent);
    }

    .stateBox .emoji { font-size: 40px; margin-bottom: 12px; }
    .stateBox h2 { margin: 0 0 8px; font-size: 20px; color: var(--ink, #0f172a); }
    .stateBox p { margin: 0; font-size: 14px; }

    @media (max-width: 700px) {
      .bookingCard { grid-template-columns: 1fr; }
      .bookingCard img { height: 180px; }
      .dates { flex-direction: column; gap: 8px; }
      .bottomRow { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>

    emailjs.init(EMAILJS_PUBLIC_KEY);

    async function sendCancellationEmail({ userEmail, userName, carName, pickupDate, dropoffDate, saleId }) {
      try {
        await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_CANCEL_TEMPLATE, {
          user_email:   userEmail,
          user_name:    userName,
          car_name:     carName,
          pickup_date:  pickupDate,
          dropoff_date: dropoffDate,
          sale_id:      saleId,
        });
        console.log("✅ Cancellation email sent");
      } catch (err) {
        console.warn("EmailJS cancellation email failed:", err);
      }
    }

    function requireSession() {
      const email = localStorage.getItem("userEmail");
      const loggedInAt = Number(localStorage.getItem("loggedInAt") || "0");
      if (!email || !loggedInAt) {
        if (isLocalPreview) return "";
        window.location.replace("index.html"); throw new Error("No session");
      }
      if (Date.now() - loggedInAt > SESSION_MS) {
        localStorage.removeItem("userEmail");
        localStorage.removeItem("loggedInAt");
        localStorage.removeItem("isAdmin");
        if (isLocalPreview) return "";
        window.location.replace("index.html");
        throw new Error("Session expired");
      }
      return email;
    }

    const userEmail = requireSession();

    function loadImageAssignments() {
      const raw = localStorage.getItem(IMAGE_ASSIGNMENTS_KEY);
      return raw ? JSON.parse(raw) : {};
    }

    function saveImageAssignments(assignments) {
      localStorage.setItem(IMAGE_ASSIGNMENTS_KEY, JSON.stringify(assignments));
    }

    function normalizeModelKeyPart(value) {
      return String(value || "").toLowerCase().replace(/\s+/g, " ").trim();
    }

    function getOrCreateImageAssignment(vehicleId, manufacturer, model) {
      if (!vehicleId || !manufacturer || !model) return './assets/cars/dummy.png';
      const modelKey = `${normalizeModelKeyPart(manufacturer)}/${normalizeModelKeyPart(model)}`;
      const assignments = loadImageAssignments();

      if (assignments[vehicleId]) {
        const validPaths = new Set((IMAGE_MANIFEST[modelKey] || []).map(i => `./assets/cars/${modelKey}/${i.num}.${i.ext}`));
        if (validPaths.has(assignments[vehicleId])) return assignments[vehicleId];
        delete assignments[vehicleId];
        saveImageAssignments(assignments);
      }

      const available = IMAGE_MANIFEST[modelKey] || [];
      if (!available.length) return './assets/cars/dummy.png';

      const usedUrls = new Set(Object.entries(assignments)
        .filter(([vid]) => vid !== vehicleId)
        .map(([, url]) => url)
        .filter(url => url.includes(`/assets/cars/${modelKey}/`)));

      const pool = available.filter(i => !usedUrls.has(`./assets/cars/${modelKey}/${i.num}.${i.ext}`));
      const chosen = (pool.length ? pool : available)[Math.floor(Math.random() * (pool.length || available.length))];
      const url = `./assets/cars/${modelKey}/${chosen.num}.${chosen.ext}`;
      assignments[vehicleId] = url;
      saveImageAssignments(assignments);
      return url;
    }

    function formatDate(dateStr) {
      if (!dateStr) return "—";
      const [year, month, day] = dateStr.slice(0, 10).split("-");
      return new Date(year, month - 1, day).toLocaleDateString("en-CA", { year: "numeric", month: "short", day: "numeric" });
    }

    function formatMoney(val) { return `$${Number(val || 0).toFixed(2)}`; }

    function normalizeLocation(value) {
      const raw = String(value || "").trim();
      if (!raw) return "";

      const parts = raw
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, " ")
        .trim()
        .split(/\s+/)
        .filter(Boolean);

      if (!parts.length) return "";

      return parts
        .map((part, index) =>
          index === 0 ? part : part.charAt(0).toUpperCase() + part.slice(1)
        )
        .join("");
    }

    function getRowValue(row, ...keys) {
      for (const key of keys) {
        if (row && row[key] !== undefined && row[key] !== null && String(row[key]).trim() !== "") return row[key];
      }
      return "";
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    const LOCAL_REVIEW_STORAGE_KEY = "vehicleReviewsLocal";

    function loadLocalReviewStore() {
      try {
        const raw = localStorage.getItem(LOCAL_REVIEW_STORAGE_KEY);
        const parsed = raw ? JSON.parse(raw) : {};
        return parsed && typeof parsed === "object" ? parsed : {};
      } catch {
        return {};
      }
    }

    function saveLocalReviewStore(store) {
      localStorage.setItem(LOCAL_REVIEW_STORAGE_KEY, JSON.stringify(store));
    }

    function buildReviewData(rows) {
      const safeRows = Array.isArray(rows) ? rows : [];
      const averageRating = safeRows.length
        ? safeRows.reduce((sum, row) => sum + Number(row.rating || 0), 0) / safeRows.length
        : 0;
      return {
        reviewCount: safeRows.length,
        averageRating,
        rows: safeRows,
      };
    }

    function getLocalReviewData(vehicleId) {
      const store = loadLocalReviewStore();
      const rows = Array.isArray(store[String(vehicleId)]) ? store[String(vehicleId)] : [];
      const sorted = rows.slice().sort((a, b) => String(b.updatedAt || "").localeCompare(String(a.updatedAt || "")));
      return buildReviewData(sorted);
    }

    function saveLocalReview(vehicleId, rating, comment) {
      const key = String(vehicleId || "");
      const store = loadLocalReviewStore();
      const rows = Array.isArray(store[key]) ? store[key] : [];
      const timestamp = new Date().toISOString();
      const userData = (() => {
        try { return JSON.parse(localStorage.getItem("userData") || "{}"); } catch { return {}; }
      })();
      const authorName = [userData.firstName || userData["First Name"], userData.lastName || userData["Last Name"]]
        .filter(Boolean)
        .join(" ")
        .trim() || String(userEmail || "Local User");
      const nextRows = rows.filter((row) => String(row.userEmail || "") !== String(userEmail || ""));
      nextRows.unshift({
        rating,
        comment,
        authorName,
        userEmail,
        firstName: userData.firstName || userData["First Name"] || "",
        lastName: userData.lastName || userData["Last Name"] || "",
        createdAt: timestamp,
        updatedAt: timestamp,
      });
      store[key] = nextRows;
      saveLocalReviewStore(store);
      return buildReviewData(nextRows);
    }

    async function fetchVehicleReviews(vehicleId) {
      try {
        const res = await fetch(`${API_BASE}/cars/${encodeURIComponent(vehicleId)}/reviews`);
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          if (isLocalPreview && res.status === 404) {
            return getLocalReviewData(vehicleId);
          }
          throw new Error(data.error || "Could not load reviews");
        }
        return {
          reviewCount: Number(data.reviewCount || 0),
          averageRating: Number(data.averageRating || 0),
          rows: Array.isArray(data.rows) ? data.rows : [],
        };
      } catch (err) {
        if (isLocalPreview && err instanceof TypeError) {
          return getLocalReviewData(vehicleId);
        }
        throw err;
      }
    }

    function fillReviewPanel(panel, vehicleId, data) {
      if (data?.unavailable) {
        panel.innerHTML = `<div class="reviewStatus">Reviews are temporarily unavailable. Please try again later.</div>`;
        return;
      }

      const existing = (data.rows || []).find((row) => {
        const fullName = `${row.firstName || ""} ${row.lastName || ""}`.trim();
        const userData = JSON.parse(localStorage.getItem("userData") || "{}");
        const currentName = `${userData.firstName || ""} ${userData.lastName || ""}`.trim();
        return currentName && fullName && currentName === fullName;
      });

      panel.innerHTML = `
        <div class="summary">
          ${data.reviewCount ? `⭐ ${data.averageRating.toFixed(1)} average from ${data.reviewCount} review(s)` : "No reviews yet for this vehicle."}
        </div>
        <select class="reviewRating">
          <option value="5" ${existing?.rating === 5 ? "selected" : ""}>5 stars</option>
          <option value="4" ${existing?.rating === 4 ? "selected" : ""}>4 stars</option>
          <option value="3" ${existing?.rating === 3 ? "selected" : ""}>3 stars</option>
          <option value="2" ${existing?.rating === 2 ? "selected" : ""}>2 stars</option>
          <option value="1" ${existing?.rating === 1 ? "selected" : ""}>1 star</option>
        </select>
        <textarea class="reviewCommentInput" placeholder="Share your experience with this car...">${escapeHtml(existing?.comment || "")}</textarea>
        <div class="rowActions">
          <button class="reviewSubmitBtn" type="button" data-vehicle-id="${escapeHtml(vehicleId)}">${existing ? "Update Review" : "Post Review"}</button>
          <div class="reviewStatus"></div>
        </div>
      `;

      const submitBtn = panel.querySelector(".reviewSubmitBtn");
      submitBtn?.addEventListener("click", () => submitReview(panel, vehicleId, submitBtn));
    }

    async function toggleReviewPanel(buttonEl) {
      const card = buttonEl.closest(".bookingCard");
      const panel = card?.querySelector(".reviewPanel");
      const vehicleId = card?.getAttribute("data-vehicleid") || "";
      if (!panel || !vehicleId) return;

      if (panel.classList.contains("open")) {
        panel.classList.remove("open");
        panel.innerHTML = "";
        buttonEl.textContent = "Leave Review";
        return;
      }

      panel.classList.add("open");
      panel.innerHTML = `<div class="reviewStatus">Loading review form...</div>`;
      buttonEl.textContent = "Hide Review";

      try {
        const data = await fetchVehicleReviews(vehicleId);
        fillReviewPanel(panel, vehicleId, data);
      } catch (err) {
        fillReviewPanel(panel, vehicleId, { unavailable: true });
      }
    }

    async function submitReview(panel, vehicleId, buttonEl) {
      const rating = Number(panel.querySelector(".reviewRating")?.value || 0);
      const comment = String(panel.querySelector(".reviewCommentInput")?.value || "").trim();
      const statusEl = panel.querySelector(".reviewStatus");

      if (!Number.isFinite(rating) || rating < 1 || rating > 5) {
        if (statusEl) statusEl.textContent = "Choose a rating from 1 to 5.";
        return;
      }
      if (comment.length < 3) {
        if (statusEl) statusEl.textContent = "Comment must be at least 3 characters.";
        return;
      }

      buttonEl.disabled = true;
      if (statusEl) statusEl.textContent = "Saving review...";

      try {
        const res = await fetch(`${API_BASE}/cars/${encodeURIComponent(vehicleId)}/reviews`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "X-User-Email": userEmail,
          },
          body: JSON.stringify({ rating, comment }),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          if (isLocalPreview && res.status === 404) {
            const localData = saveLocalReview(vehicleId, rating, comment);
            fillReviewPanel(panel, vehicleId, localData);
            const nextStatus = panel.querySelector(".reviewStatus");
            if (nextStatus) nextStatus.textContent = "Review saved locally.";
            return;
          }
          if (res.status === 404 || res.status >= 500) {
            if (statusEl) statusEl.textContent = "Reviews are temporarily unavailable. Please try again later.";
            return;
          }
          throw new Error(data.error || "Could not save review");
        }

        const refreshed = await fetchVehicleReviews(vehicleId);
        fillReviewPanel(panel, vehicleId, refreshed);
        const nextStatus = panel.querySelector(".reviewStatus");
        if (nextStatus) nextStatus.textContent = "Review saved.";
      } catch (err) {
        if (isLocalPreview && err instanceof TypeError) {
          const localData = saveLocalReview(vehicleId, rating, comment);
          fillReviewPanel(panel, vehicleId, localData);
          const nextStatus = panel.querySelector(".reviewStatus");
          if (nextStatus) nextStatus.textContent = "Review saved locally.";
          return;
        }
        if (statusEl) statusEl.textContent = "Reviews are temporarily unavailable. Please try again later.";
      } finally {
        buttonEl.disabled = false;
      }
    }

    // ✅ Print booking receipt
    function printBooking({ name, saleId, refNum, price, pickupDate, dropoffDate, pickupLocation, dropoffLocation, vehicleType, drivetrain, imgSrc }) {
      const userData = JSON.parse(localStorage.getItem("userData") || "{}");
      const userName = `${userData.firstName || ""} ${userData.lastName || ""}`.trim() || userEmail;

      const win = window.open("", "_blank", "width=600,height=700");
      win.document.write(`
        <!DOCTYPE html>
        <html>
        <head>
          <title>Booking Receipt — ${name}</title>
          <style>
            * { box-sizing: border-box; margin: 0; padding: 0; font-family: Inter, Arial, sans-serif; }
            body { background: #f8fafc; padding: 40px; color: #0f172a; }
            .receipt { background: white; border-radius: 16px; padding: 36px; max-width: 500px; margin: 0 auto; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
            .header { text-align: center; margin-bottom: 28px; border-bottom: 2px solid #eef2ff; padding-bottom: 24px; }
            .logo { font-size: 22px; font-weight: 800; color: #4f46e5; margin-bottom: 4px; }
            .logo span { color: #0f172a; }
            .title { font-size: 13px; color: #64748b; }
            .car-img { width: 100%; height: 160px; object-fit: cover; border-radius: 12px; margin-bottom: 20px; }
            .car-name { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
            .sale-id { font-size: 12px; color: #94a3b8; margin-bottom: 16px; }
            .ref-box { background: #eef2ff; border: 1px dashed #c7d2fe; border-radius: 10px; padding: 12px 16px; margin-bottom: 20px; text-align: center; }
            .ref-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: #64748b; }
            .ref-num { font-size: 20px; font-weight: 800; color: #4f46e5; font-family: 'Courier New', monospace; letter-spacing: 0.06em; }
            .row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f1f5f9; font-size: 14px; }
            .row:last-child { border-bottom: none; }
            .row .label { color: #64748b; }
            .row .val { font-weight: 600; text-align: right; }
            .total-row { display: flex; justify-content: space-between; padding: 14px 0 0; font-size: 16px; font-weight: 700; }
            .footer { text-align: center; margin-top: 24px; font-size: 12px; color: #94a3b8; }
            @media print {
              body { background: white; padding: 0; }
              .receipt { box-shadow: none; }
              .no-print { display: none; }
            }
          </style>
        </head>
        <body>
          <div class="receipt">
            <div class="header">
              <div class="logo">CP317 <span>Car Rentals</span></div>
              <div class="title">Booking Receipt</div>
            </div>
            <img class="car-img" src="${window.location.origin}/${imgSrc.replace('./', '')}" onerror="this.style.display='none'" alt="${name}">
            <div class="car-name">${name}</div>
            <div class="sale-id">Sale ID #${saleId}</div>
            ${refNum ? `
            <div class="ref-box">
              <div class="ref-label">Reference Number</div>
              <div class="ref-num">${refNum}</div>
            </div>` : ""}
            <div class="row"><span class="label">Customer</span><span class="val">${userName}</span></div>
            <div class="row"><span class="label">Vehicle Type</span><span class="val">${vehicleType}</span></div>
            <div class="row"><span class="label">Drivetrain</span><span class="val">${drivetrain}</span></div>
            <div class="row"><span class="label">Pickup Date</span><span class="val">${pickupDate}</span></div>
            <div class="row"><span class="label">Dropoff Date</span><span class="val">${dropoffDate}</span></div>
            <div class="row"><span class="label">Pickup Location</span><span class="val">${pickupLocation}</span></div>
            <div class="row"><span class="label">Dropoff Location</span><span class="val">${dropoffLocation}</span></div>
            <div class="total-row"><span>Total Paid</span><span style="color:#4f46e5">${price}</span></div>
            <div class="footer">
              Thank you for renting with CP317 Car Rentals!<br>
              Printed on ${new Date().toLocaleDateString("en-CA", { year:"numeric", month:"long", day:"numeric" })}
            </div>
          </div>
          <script>window.onload = () => window.print();<\/script>
        </body>
        </html>
      `);
      win.document.close();
    }

    async function cancelBooking(saleId, carName, fromDate, toDate, btnEl) {
      if (!confirm("Cancel this booking? The car will be made available again.")) return;
      btnEl.disabled = true;
      btnEl.textContent = "Cancelling...";

      try {
        const res = await fetch(`${API_BASE}/me/bookings/${saleId}`, {
          method: "DELETE",
          headers: { "X-User-Email": userEmail }
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || "Cancel failed");

        const userData = JSON.parse(localStorage.getItem("userData") || "{}");
        const userName = `${userData.firstName || ""} ${userData.lastName || ""}`.trim() || userEmail;
        await sendCancellationEmail({
          userEmail, userName, carName,
          pickupDate:  formatDate(fromDate),
          dropoffDate: formatDate(toDate),
          saleId,
        });

        const refs = JSON.parse(localStorage.getItem("bookingRefs") || "{}");
        delete refs[saleId];
        localStorage.setItem("bookingRefs", JSON.stringify(refs));

        const card = btnEl.closest(".bookingCard");
        card.style.transition = "opacity 0.3s";
        card.style.opacity = "0";
        setTimeout(() => {
          card.remove();
          if (!document.querySelectorAll(".bookingCard").length) {
            document.getElementById("bookingsContainer").innerHTML = `
              <div class="stateBox">
                <div class="emoji">🚗</div>
                <h2>No bookings yet</h2>
                <p>You haven't rented any cars yet. <a href="cars.html" style="color:var(--accent,#4f46e5);">Browse cars</a> to get started.</p>
              </div>`;
          }
        }, 300);
      } catch (err) {
        btnEl.disabled = false;
        btnEl.textContent = "Cancel Booking";
        alert(`Error: ${err.message}`);
      }
    }

    async function loadBookings() {
      const container = document.getElementById("bookingsContainer");
      if (!userEmail) {
        container.innerHTML = `
          <div class="stateBox">
            <div class="emoji">🔒</div>
            <h2>Preview mode</h2>
            <p>Local preview mode does not use Google sign-in. Sign in on the deployed app to view real bookings, or <a href="cars.html?preview=1" style="color:var(--accent,#4f46e5);">browse cars</a> here.</p>
          </div>`;
        return;
      }
      try {
        const res = await fetch(`${API_BASE}/me/bookings`, { headers: { "X-User-Email": userEmail } });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || "Could not load bookings");

        const rows = Array.isArray(data.rows) ? data.rows : [];
        const refs = JSON.parse(localStorage.getItem("bookingRefs") || "{}");

        if (!rows.length) {
          container.innerHTML = `
            <div class="stateBox">
              <div class="emoji">🚗</div>
              <h2>No bookings yet</h2>
              <p>You haven't rented any cars yet. <a href="cars.html?preview=1" style="color:var(--accent,#4f46e5);">Browse cars</a> to get started.</p>
            </div>`;
          return;
        }

        container.innerHTML = rows.map(booking => {
          const vehicleId    = booking.vehicleId    || booking["Vehicle ID"]   || "";
          const manufacturer = booking.manufacturer || booking["Manufacturer"] || "";
          const model        = booking.model        || booking["Model"]        || "";
          const name = `${manufacturer} ${model}`.trim() || "Unknown Vehicle";
          const imgSrc = getOrCreateImageAssignment(vehicleId, manufacturer, model);
          const pickupLocation  = normalizeLocation(getRowValue(booking, "pickupLocation",  "pickup_location",  "Pickup Location"));
          const dropoffLocation = normalizeLocation(getRowValue(booking, "dropOffLocation", "dropoffLocation", "dropoff_location", "Drop Off Location", "Dropoff Location"));          const refNum = refs[booking.saleId] || null;

          return `
            <div class="bookingCard"
              data-saleid="${booking.saleId}"
              data-vehicleid="${vehicleId}"
              data-carname="${name}"
              data-fromdate="${booking.fromDate || ""}"
              data-todate="${booking.toDate || ""}"
              data-vehicletype="${booking.vehicleType || booking["Vehicle Type"] || "—"}"
              data-drivetrain="${booking.drivetrain || booking["Drivetrain"] || "—"}"
              data-pickuplocation="${pickupLocation || "—"}"
              data-dropofflocation="${dropoffLocation || "—"}"
              data-price="${formatMoney(booking.priceSoldAt)}"
              data-imgsrc="${imgSrc}"
              data-refnum="${refNum || ""}">
              <img src="${imgSrc}" alt="${name}" onerror="this.src='./assets/cars/dummy.png'">
              <div class="bookingBody">
                <div>
                  <div class="bookingTop">
                    <div>
                      <h2>${name}</h2>
                      <div class="saleId">Sale ID #${booking.saleId}</div>
                    </div>
                    <div class="price">${formatMoney(booking.priceSoldAt)} total</div>
                  </div>
                  <div class="pillRow">
                    <span class="pill">${booking.vehicleType || booking["Vehicle Type"] || "—"}</span>
                    <span class="pill">${booking.drivetrain  || booking["Drivetrain"]   || "—"}</span>
                    <span class="pill">Pickup: ${pickupLocation  || "—"}</span>
                    <span class="pill">Dropoff: ${dropoffLocation || "—"}</span>
                    ${refNum ? `<span class="pill-ref">🔖 Ref: ${refNum}</span>` : ""}
                  </div>
                </div>
                <div class="bottomRow">
                  <div class="dates">
                    <div class="dateBox">
                      <div class="label">Pickup</div>
                      <div class="value">${formatDate(booking.fromDate)}</div>
                    </div>
                    <div class="dateBox">
                      <div class="label">Dropoff</div>
                      <div class="value">${formatDate(booking.toDate)}</div>
                    </div>
                  </div>
                  <div class="actionBtns">
                    <button class="printBtn" data-saleid="${booking.saleId}">🖨️ Print</button>
                    <button class="reviewBtn" data-saleid="${booking.saleId}" data-vehicleid="${vehicleId}">Leave Review</button>
                    <button class="cancelBtn" data-saleid="${booking.saleId}">Cancel Booking</button>
                  </div>
                </div>
                <div class="reviewPanel"></div>
              </div>
            </div>`;
        }).join("");

        // Cancel listeners
        container.querySelectorAll(".cancelBtn").forEach(btn => {
          btn.addEventListener("click", () => {
            const card = btn.closest(".bookingCard");
            cancelBooking(
              btn.getAttribute("data-saleid"),
              card.getAttribute("data-carname"),
              card.getAttribute("data-fromdate"),
              card.getAttribute("data-todate"),
              btn
            );
          });
        });

        // ✅ Print listeners
        container.querySelectorAll(".printBtn").forEach(btn => {
          btn.addEventListener("click", () => {
            const card = btn.closest(".bookingCard");
            printBooking({
              name:             card.getAttribute("data-carname"),
              saleId:           card.getAttribute("data-saleid"),
              refNum:           card.getAttribute("data-refnum"),
              price:            card.getAttribute("data-price"),
              pickupDate:       formatDate(card.getAttribute("data-fromdate")),
              dropoffDate:      formatDate(card.getAttribute("data-todate")),
              pickupLocation:   card.getAttribute("data-pickuplocation"),
              dropoffLocation:  card.getAttribute("data-dropofflocation"),
              vehicleType:      card.getAttribute("data-vehicletype"),
              drivetrain:       card.getAttribute("data-drivetrain"),
              imgSrc:           card.getAttribute("data-imgsrc"),
            });
          });
        });

        container.querySelectorAll(".reviewBtn").forEach(btn => {
          btn.addEventListener("click", () => toggleReviewPanel(btn));
        });

      } catch (err) {
        container.innerHTML = `
          <div class="stateBox">
            <div class="emoji">⚠️</div>
            <h2>Could not load bookings</h2>
            <p>${err.message}</p>
          </div>`;
      }
    }

    loadBookings();
  </script>
  <script src="navbar.js"></script>
  <script src="darkm.js"></script>
</body>
</html>
